<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #1e1e1e; --surface: #252526; --border: #3e3e42;
    --text: #cccccc; --text-secondary: #8a8a8a; --accent: #0078d4;
    --user-bg: #094771; --assistant-bg: #2d2d2d; --code-bg: #1a1a1a;
    --tool-bg: #1a2b3d; --tool-border: #2a4a6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
    font-size: var(--vscode-font-size, 13px);
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 8px; animation: fadeIn 0.2s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg .avatar {
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 1px;
  }
  .msg.user .avatar { background: var(--accent); }
  .msg.assistant .avatar { background: #3c3c3c; }
  .msg .content { max-width: calc(100% - 44px); display: flex; flex-direction: column; min-width: 0; }
  .msg .bubble {
    padding: 10px 14px; border-radius: 10px; line-height: 1.55; font-size: 13px;
    word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--assistant-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.assistant .bubble code {
    background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 12px;
    border: 1px solid var(--border);
  }
  .msg.assistant .bubble pre {
    background: #0d0d0d; padding: 10px 14px; border-radius: 6px;
    overflow-x: auto; margin: 6px 0; border: 1px solid var(--border);
    font-size: 12px;
  }
  .msg.assistant .bubble pre code { background: none; padding: 0; border: none; }
  .attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .attachment-chip {
    display: flex; align-items: center; gap: 4px;
    background: #333; border: 1px solid #555; border-radius: 14px;
    padding: 4px 10px; font-size: 11px; max-width: 180px;
  }
  .attachment-chip img { width: 20px; height: 20px; border-radius: 3px; object-fit: cover; }
  .attachment-chip .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attachment-chip .remove {
    cursor: pointer; color: #888; margin-left: 2px; font-size: 14px; line-height: 1;
  }
  .attachment-chip .remove:hover { color: #f48771; }
  .image-preview { max-width: 200px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }

  /* Code block wrapper */
  .code-block-wrap {
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 8px 0;
    background: #0d0d0d;
  }
  .code-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px; background: #1e1e1e; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-secondary);
  }
  .code-block-header .lang-tag { font-weight: 600; text-transform: uppercase; }
  .code-block-header .actions { display: flex; gap: 4px; }
  .code-block-header .actions button {
    background: transparent; border: none; color: var(--text-secondary);
    cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    font-family: inherit;
  }
  .code-block-header .actions button:hover { background: #333; color: var(--text); }
  .code-block-wrap pre { margin: 0 !important; border: none !important; border-radius: 0 !important; }
  .code-block-wrap .apply-path {
    font-size: 10px; color: #569cd6; margin-left: 6px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Tool call cards */
  .tool-call-card {
    border: 1px solid var(--tool-border); border-radius: 8px; margin: 6px 0;
    background: var(--tool-bg); font-size: 12px; overflow: hidden;
  }
  .tool-call-card .tool-header {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px;
    cursor: pointer; user-select: none;
  }
  .tool-call-card .tool-header:hover { background: rgba(255,255,255,0.03); }
  .tool-call-card .tool-icon { font-size: 14px; flex-shrink: 0; }
  .tool-call-card .tool-name { font-weight: 600; }
  .tool-call-card .tool-summary { color: var(--text-secondary); font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-call-card .tool-body { padding: 8px 10px; border-top: 1px solid var(--tool-border); display: none; }
  .tool-call-card.open .tool-body { display: block; }
  .tool-call-card .tool-body pre {
    margin: 0; font-size: 11px; max-height: 200px; overflow-y: auto;
    background: #111; border: 1px solid #333; border-radius: 4px; padding: 8px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 6px 18px; border-radius: 20px;
    font-size: 12px; z-index: 100; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  .drop-zone {
    display: none; position: absolute; inset: 0;
    background: rgba(0,120,212,0.15); border: 2px dashed var(--accent);
    align-items: center; justify-content: center; font-size: 16px;
    color: var(--accent); z-index: 10; pointer-events: none;
  }
  .drop-zone.active { display: flex; }
  body { position: relative; }
  .toolbar {
    padding: 8px 16px; display: flex; gap: 8px;
    border-top: 1px solid var(--border); flex-wrap: wrap; align-items: center;
  }
  .toolbar button, .toolbar label.btn-file {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 5px 12px; border-radius: 14px; cursor: pointer; font-size: 11px;
    transition: all 0.15s; font-family: inherit;
  }
  .toolbar button:hover, .toolbar label.btn-file:hover { background: #3c3c3c; color: var(--text); }
  .toolbar .model-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 4px 10px; border-radius: 14px; font-size: 11px; outline: none; font-family: inherit;
  }
  .cancel-btn {
    background: #5a1d1d !important; border-color: #8b3a3a !important; color: #f48771 !important;
    display: none;
  }
  .cancel-btn.visible { display: inline-block; }
  .input-area { padding: 10px 16px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-wrap {
    display: flex; gap: 6px; background: var(--code-bg);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 4px 4px 4px 12px; align-items: flex-end;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap textarea {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 13px; font-family: var(--vscode-editor-font-family, 'Consolas', 'Courier New', monospace);
    resize: none; outline: none; min-height: 26px; max-height: 150px;
    line-height: 1.5; padding: 4px 0;
  }
  .input-wrap textarea::placeholder { color: #555; }
  .input-wrap .btn-icon {
    background: transparent; border: none; color: var(--text-secondary);
    cursor: pointer; padding: 6px 8px; font-size: 16px; border-radius: 6px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .input-wrap .btn-icon:hover { color: var(--text); background: #333; }
  .input-wrap .btn-mic {
    background: transparent; border: none; color: var(--text-secondary);
    cursor: pointer; padding: 6px 8px; font-size: 16px; border-radius: 50%;
    transition: all 0.2s; flex-shrink: 0;
  }
  .input-wrap .btn-mic:hover { color: var(--text); background: #333; }
  .input-wrap .btn-mic.recording {
    color: #ff4444; background: rgba(255,68,68,0.15);
    animation: micPulse 1.4s infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(255,68,68,0); }
  }
  .input-wrap .btn-send {
    background: var(--accent); border: none; color: #fff;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 500; font-family: inherit; flex-shrink: 0;
  }
  .input-wrap .btn-send:hover { opacity: 0.9; }
  .input-wrap .btn-send:disabled { opacity: 0.4; }
  .key-setup { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
  .key-setup input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 11px; outline: none; font-family: inherit; }
  .key-setup input:focus { border-color: var(--accent); }
  .key-setup span { font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
  .stored-files { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 16px 0; }
  .stored-file {
    display: flex; align-items: center; gap: 4px;
    background: #2d2d2d; border: 1px solid var(--border); border-radius: 14px;
    padding: 3px 10px; font-size: 10px; cursor: pointer;
  }
  .stored-file:hover { background: #3c3c3c; }
  .stored-file .remove-file { cursor: pointer; color: #888; margin-left: 2px; }
  .stored-file .remove-file:hover { color: #f48771; }
  .streaming-cursor {
    display: inline-block; width: 6px; height: 14px; background: var(--accent);
    animation: blink 0.8s infinite; vertical-align: text-bottom; margin-left: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">拖放文件到这里添加到对话</div>
<div class="toast" id="toast"></div>

<div class="messages" id="messages">
  <div class="msg assistant">
    <div class="avatar">&#x1F916;</div>
    <div class="content">
      <div class="bubble">
        <div style="text-align:center;color:var(--text-secondary);line-height:1.8;padding:20px 0;">
          <div style="font-size:28px;margin-bottom:8px;">&#x26A1;</div>
          <b>AI Code Chat</b><br>
          提问、粘贴代码、发送截图<br>
          拖放文件到窗口即可添加到对话<br>
          <small style="color:#666">流式输出 | 代码块操作 | 工具调用可视化</small>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="stored-files" id="storedFiles"></div>

<div class="key-setup" id="keySetup">
  <span>API Key:</span>
  <input type="password" id="apiKey" placeholder="输入 DeepSeek API Key (sk-...)" onchange="saveKey()">
  <span id="keyStatus" style="font-size:9px;color:#666">仅存本地</span>
</div>

<div class="toolbar">
  <button onclick="clearAll()">清空</button>
  <button onclick="exportChat()">导出</button>
  <select class="model-select" id="modelSelect" onchange="switchModel(this.value)">
    <option value="deepseek-chat">DeepSeek V3</option>
    <option value="deepseek-reasoner">DeepSeek R1</option>
  </select>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelRequest()">取消</button>
  <span style="font-size:10px;color:var(--text-secondary);margin-left:auto;" id="statusText">就绪</span>
</div>

<div class="input-area">
  <div class="input-wrap">
    <button class="btn-icon" onclick="addFiles()" title="添加文件">&#x1F4CE;</button>
    <button class="btn-mic" id="micBtn" onclick="toggleVoice()" title="语音输入">&#x1F3A4;</button>
    <textarea id="input" rows="1" placeholder="输入消息... Enter 发送, Shift+Enter 换行" onkeydown="handleKey(event)"></textarea>
    <button class="btn-icon" onclick="captureScreen()" title="截屏(需要权限)">&#x1F4F8;</button>
    <button class="btn-send" id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
const vscode = acquireVsCodeApi();
let pendingAttachments = [];
let conversationHistory = [];
let msgCounter = 0;
let activeRequestId = null;
let currentAssistantEl = null;
let streamingContent = '';

// ---- Message rendering ----

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  if (!text) return '';
  // Process code blocks first (```lang\ncode\n```) or (```lang:path\ncode\n```)
  let html = '';
  let remaining = text;
  const fenceRegex = /```(\w+)?(?::(\S+))?\n([\s\S]*?)```/g;
  let lastIdx = 0;
  let match;

  while ((match = fenceRegex.exec(text)) !== null) {
    // Text before this code block
    const before = text.slice(lastIdx, match.index);
    html += renderInline(before);

    const lang = match[1] || '';
    const filePath = match[2] || '';
    const code = match[3];

    html += '<div class="code-block-wrap">';
    html += '<div class="code-block-header">';
    html += '<span>' + esc(lang || 'code') + '</span>';
    if (filePath) html += '<span class="apply-path">' + esc(filePath) + '</span>';
    html += '<span style="flex:1"></span>';
    html += '<div class="actions">';
    html += '<button onclick="copyCodeBlock(this)" title="Copy">Copy</button>';
    if (filePath) html += '<button onclick="applyCodeBlock(this,\'' + esc(filePath) + '\')" title="Apply to project">Apply</button>';
    if (lang === 'html' || lang === 'htm') html += '<button onclick="previewHtmlBlock(this)" title="Preview in browser">Preview</button>';
    html += '</div></div>';
    html += '<pre><code>' + esc(code) + '</code></pre>';
    html += '</div>';

    lastIdx = match.index + match[0].length;
  }

  // Remaining text after last code block
  html += renderInline(text.slice(lastIdx));
  return html;
}

function renderInline(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/\*([^*]+)\*/g, '<i>$1</i>')
    .replace(/\n/g, '<br>');
}

function createMsgElement(role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '&#x1F464;' : '&#x1F916;'}</div>
    <div class="content"><div class="bubble"></div></div>
  `;
  return div;
}

function addUserMsg(text, attachments) {
  const div = createMsgElement('user');
  let attachHtml = '';
  if (attachments && attachments.length) {
    attachHtml = '<div class="attachments">' + attachments.map(a => {
      if (a.isImage) return `<img class="image-preview" src="${a.content}" alt="${esc(a.name)}" onclick="showImage('${a.content.replace(/'/g,"\\'")}')">`;
      return `<span class="attachment-chip">&#x1F4C4; <span class="name">${esc(a.name)}</span></span>`;
    }).join('') + '</div>';
  }
  div.querySelector('.bubble').innerHTML = esc(text) + attachHtml;
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function addAssistantMsg() {
  const div = createMsgElement('assistant');
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
  return div;
}

function updateAssistantBubble(el, text, isStreaming) {
  const bubble = el.querySelector('.bubble');
  bubble.innerHTML = renderMarkdown(text);
  if (isStreaming) {
    bubble.innerHTML += '<span class="streaming-cursor"></span>';
  }
  scrollToBottom();
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ---- Tool call cards ----

function addToolCallCard(parentEl, tool, params, id) {
  const card = document.createElement('div');
  card.className = 'tool-call-card';
  card.id = 'tool-' + id;
  const summary = JSON.stringify(params || {}).slice(0, 60);

  const iconMap = {
    read_file: '&#x1F4C4;', write_file: '&#x270F;', edit_file: '&#x270F;',
    bash_exec: '&#x2699;', glob_search: '&#x1F50D;', grep_search: '&#x1F50D;',
    web_search: '&#x1F310;', web_fetch: '&#x1F310;', list_files: '&#x1F4C1;',
    system_info: '&#x1F4CA;', search_kb: '&#x1F4DA;', document_parse: '&#x1F4C4;'
  };

  card.innerHTML = `
    <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="tool-icon">${iconMap[tool] || '&#x1F527;'}</span>
      <span class="tool-name">${esc(tool)}</span>
      <span class="tool-summary">${esc(summary)}</span>
      <span style="font-size:10px;color:#666">&#x25BC;</span>
    </div>
    <div class="tool-body">
      <div style="color:var(--text-secondary);margin-bottom:4px;">Params:</div>
      <pre>${esc(JSON.stringify(params, null, 2))}</pre>
      <div class="tool-result" style="display:none;margin-top:6px;">
        <div style="color:var(--text-secondary);margin-bottom:4px;">Result:</div>
        <pre class="result-content"></pre>
      </div>
    </div>
  `;
  parentEl.appendChild(card);
  return card;
}

function updateToolResult(card, result) {
  const resultDiv = card.querySelector('.tool-result');
  const resultContent = card.querySelector('.result-content');
  resultDiv.style.display = 'block';
  resultContent.textContent = JSON.stringify(result, null, 2).slice(0, 2000);
  card.querySelector('.tool-summary').textContent = result.ok ? 'Done' : ('Error: ' + (result.error || ''));
}

// ---- Toast ----

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ---- Chat actions ----

function copyCodeBlock(btn) {
  const code = btn.closest('.code-block-wrap').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('Copied!'));
}

function applyCodeBlock(btn, filePath) {
  const code = btn.closest('.code-block-wrap').querySelector('code').textContent;
  vscode.postMessage({ type: 'saveFile', path: filePath, content: code });
  showToast('Applied to ' + filePath);
}

function previewHtmlBlock(btn) {
  const code = btn.closest('.code-block-wrap').querySelector('code').textContent;
  const win = window.open('', '_blank', 'width=800,height=600');
  win.document.write(code);
}

function showImage(src) {
  const win = window.open('', '_blank');
  win.document.write('<img src="' + src + '" style="max-width:100%">');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function setSending(isSending) {
  document.getElementById('sendBtn').disabled = isSending;
  document.getElementById('cancelBtn').classList.toggle('visible', isSending);
  document.getElementById('statusText').textContent = isSending ? '等待回复...' : '就绪';
}

function cancelRequest() {
  activeRequestId = null;
  if (currentAssistantEl) {
    updateAssistantBubble(currentAssistantEl, streamingContent + '\n\n[已取消]', false);
    currentAssistantEl = null;
  }
  setSending(false);
  showToast('Request cancelled');
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text && !pendingAttachments.length) return;
  if (activeRequestId) return; // Already sending

  const atts = [...pendingAttachments];
  pendingAttachments = [];

  // Build user message content
  let userContent = '';
  for (const a of atts) {
    if (a.isImage) {
      userContent += `[图片: ${a.name}]\n`;
    } else {
      userContent += `[文件: ${a.name}]\n\`\`\`\n${a.content.slice(0, 3000)}\n\`\`\`\n`;
    }
  }
  if (text) userContent += text;
  if (!userContent) return;

  addUserMsg(text, atts);
  updateStoredFiles();
  conversationHistory.push({ role: 'user', content: userContent });

  input.value = '';
  input.style.height = 'auto';
  setSending(true);

  const requestId = ++msgCounter;
  activeRequestId = requestId;
  currentAssistantEl = addAssistantMsg();
  streamingContent = '';

  vscode.postMessage({
    type: 'api',
    id: requestId,
    model: document.getElementById('modelSelect').value,
    tools: true,
    messages: conversationHistory.map(m => ({ role: m.role, content: m.content }))
  });
}

function handleToken(id, token) {
  if (id !== activeRequestId) return;
  streamingContent += token;
  updateAssistantBubble(currentAssistantEl, streamingContent, true);
}

function handleResponse(id, content) {
  if (id !== activeRequestId) return;
  updateAssistantBubble(currentAssistantEl, content || streamingContent, false);
  conversationHistory.push({ role: 'assistant', content: content || streamingContent });
  currentAssistantEl = null;
  streamingContent = '';
  activeRequestId = null;
  setSending(false);
}

function handleError(id, message) {
  if (id !== activeRequestId) return;
  updateAssistantBubble(currentAssistantEl, 'Error: ' + message, false);
  currentAssistantEl = null;
  streamingContent = '';
  activeRequestId = null;
  setSending(false);
}

function handleToolCall(id, tool, params) {
  if (id !== activeRequestId || !currentAssistantEl) return;
  const card = addToolCallCard(currentAssistantEl.querySelector('.content'), tool, params, id + '-' + tool);
}

function handleToolResult(id, tool, result) {
  if (id !== activeRequestId || !currentAssistantEl) return;
  // Find the matching tool call card
  const cards = currentAssistantEl.querySelectorAll('.tool-call-card');
  for (const card of cards) {
    if (card.id === 'tool-' + id + '-' + tool) {
      updateToolResult(card, result);
      break;
    }
  }
}

// ---- Message listener ----

window.addEventListener('message', (e) => {
  const msg = e.data;
  switch (msg.type) {
    case 'apiToken':
      handleToken(msg.id, msg.token);
      break;
    case 'apiResponse':
      handleResponse(msg.id, msg.content);
      break;
    case 'apiError':
      handleError(msg.id, msg.message);
      break;
    case 'fileOpened':
      pendingAttachments.push(msg);
      addUserMsg('[添加了文件: ' + esc(msg.name) + ']', msg.isImage ? [msg] : [msg]);
      updateStoredFiles();
      break;
    case 'fileSaved':
      showToast(msg.ok ? 'Saved: ' + msg.path : 'Save failed: ' + (msg.error || ''));
      break;
    case 'configLoaded':
      if (msg.config && msg.config.key) {
        localStorage.setItem('deepseek_key', msg.config.key);
        const el = document.getElementById('apiKey');
        if (el) el.value = msg.config.key;
        document.getElementById('keyStatus').textContent = '服务端已配置';
        document.getElementById('keyStatus').style.color = '#4caf50';
      } else {
        document.getElementById('keyStatus').textContent = '未配置服务端Key';
        document.getElementById('keyStatus').style.color = '#ff9800';
      }
      break;
    case 'toolCall':
      handleToolCall(msg.id, msg.tool, msg.params);
      break;
    case 'toolResult':
      handleToolResult(msg.id, msg.tool, msg.result);
      break;
  }
});

// ---- Drag & Drop ----

document.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation(); document.getElementById('dropZone').classList.remove('active');
  for (const file of e.dataTransfer.files) readLocalFile(file);
});

// Paste image
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        pendingAttachments.push({ name: 'screenshot-' + Date.now() + '.png', content: reader.result, isImage: true, isBinary: true });
        addUserMsg('[粘贴了截图]', [{ name: '截图', content: reader.result, isImage: true }]);
        updateStoredFiles();
      };
      reader.readAsDataURL(blob);
    }
  }
});

function readLocalFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const isImage = file.type.startsWith('image/');
    pendingAttachments.push({ name: file.name, content: reader.result, isImage, isBinary: !isImage, size: file.size });
    updateStoredFiles();
  };
  if (file.type.startsWith('image/')) {
    reader.readAsDataURL(file);
  } else {
    reader.readAsText(file);
  }
}

function addFiles() { vscode.postMessage({ type: 'openFile' }); }

function updateStoredFiles() {
  const container = document.getElementById('storedFiles');
  if (!pendingAttachments.length) { container.innerHTML = ''; return; }
  container.innerHTML = pendingAttachments.map((a, i) =>
    `<span class="stored-file" title="${esc(a.name)}">
      ${a.isImage ? '&#x1F5BC;' : '&#x1F4C4;'} ${esc(a.name.slice(0,20))}
      <span class="remove-file" onclick="removeAttachment(${i})">&times;</span>
    </span>`
  ).join('');
}

function removeAttachment(i) {
  pendingAttachments.splice(i, 1);
  updateStoredFiles();
}

function captureScreen() {
  if (navigator.mediaDevices?.getDisplayMedia) {
    navigator.mediaDevices.getDisplayMedia({ video: true }).then(stream => {
      const track = stream.getVideoTracks()[0];
      const canvas = document.createElement('canvas');
      const video = document.createElement('video');
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        video.play();
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        track.stop();
        const url = canvas.toDataURL('image/png');
        pendingAttachments.push({ name: 'screenshot-' + Date.now() + '.png', content: url, isImage: true, isBinary: true });
        addUserMsg('[截屏]', [{ name: '截屏', content: url, isImage: true }]);
        updateStoredFiles();
      };
    }).catch(() => {
      document.getElementById('statusText').textContent = '截屏需要权限或浏览器不支持';
    });
  } else {
    document.getElementById('statusText').textContent = '当前环境不支持截屏';
  }
}

function clearAll() {
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  pendingAttachments = [];
  updateStoredFiles();
}

function exportChat() {
  const msgs = document.querySelectorAll('.msg');
  let text = '';
  msgs.forEach(m => {
    const role = m.classList.contains('user') ? 'You' : 'AI';
    const bubble = m.querySelector('.bubble');
    if (bubble) text += '[' + role + '] ' + bubble.innerText + '\n\n';
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'chat-' + new Date().toISOString().slice(0, 10) + '.txt';
  a.click();
}

function switchModel(model) {
  localStorage.setItem('ds_model', model);
  document.getElementById('statusText').textContent = 'Model: ' + model;
}

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (key) localStorage.setItem('deepseek_key', key);
}

// ---- Voice Input ----

let recognition = null;
let isRecording = false;

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('statusText').textContent = 'Current environment does not support speech recognition';
    return null;
  }
  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'zh-CN';

  rec.onresult = (event) => {
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) final += event.results[i][0].transcript;
    }
    const input = document.getElementById('input');
    if (final) input.value += final;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 150) + 'px';
  };

  rec.onerror = (event) => {
    if (event.error === 'no-speech') {
      document.getElementById('statusText').textContent = 'No speech detected, please try again';
    } else if (event.error !== 'aborted') {
      document.getElementById('statusText').textContent = 'Speech recognition error: ' + event.error;
    }
    stopRecording();
  };

  rec.onend = () => {
    if (isRecording && recognition) {
      try { recognition.start(); } catch(e) {}
    } else {
      stopRecording();
    }
  };

  return rec;
}

function toggleVoice() {
  if (isRecording) { stopRecording(); } else { startRecording(); }
}

function startRecording() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;

  isRecording = true;
  const micBtn = document.getElementById('micBtn');
  micBtn.classList.add('recording');
  micBtn.title = 'Click to stop recording';
  document.getElementById('statusText').textContent = 'Listening...';
  document.getElementById('input').placeholder = 'Listening...';

  try { recognition.start(); } catch(e) {}
}

function stopRecording() {
  isRecording = false;
  const micBtn = document.getElementById('micBtn');
  micBtn.classList.remove('recording');
  micBtn.title = 'Voice input';
  document.getElementById('statusText').textContent = 'Ready';
  document.getElementById('input').placeholder = 'Enter message... Enter to send, Shift+Enter for new line';

  if (recognition) { try { recognition.stop(); } catch(e) {} }
}

// ---- Init ----

(function init() {
  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); addFiles(); }
    if (e.key === 'Escape' && activeRequestId) { cancelRequest(); }
  });

  // Load saved model
  const savedModel = localStorage.getItem('ds_model') || 'deepseek-chat';
  document.getElementById('modelSelect').value = savedModel;

  // Try to load API key from localStorage
  const savedKey = localStorage.getItem('deepseek_key') || '';
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
    document.getElementById('keyStatus').textContent = 'Local key loaded';
    document.getElementById('keyStatus').style.color = '#4caf50';
  }

  // Also try fetching server config (non-blocking)
  vscode.postMessage({ type: 'fetchConfig' });

  document.getElementById('input').focus();
})();
</script>
