<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f5f5">
<title>Workbench</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--bdr:#e5e5e7;--txt:#111;--t2:#666;--t3:#999;--ac:#0066ff;--ac2:#0050cc;--bad:#d00;--good:#188918;--warn:#e78c07;--r:6px;--r2:12px;--safe:env(safe-area-inset-bottom,8px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--txt);height:100dvh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}

/* LEFT SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--card);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.side-hd{padding:14px 16px;font-weight:700;font-size:15px;letter-spacing:-0.2px;color:var(--txt);flex-shrink:0;border-bottom:1px solid var(--bdr)}
.side-convs{flex:1;overflow-y:auto;padding:4px 8px}
.conv-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--t2);transition:all 0.12s;margin-bottom:1px}
.conv-item:hover{background:#f0f0f5;color:var(--txt)}
.conv-item.active{background:#e8edff;color:var(--ac);font-weight:500}
.conv-item .c-icon{font-size:14px;flex-shrink:0;opacity:0.6}
.conv-item .c-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .c-del{opacity:0;font-size:13px;color:var(--t3);cursor:pointer;flex-shrink:0;padding:0 2px}
.conv-item:hover .c-del{opacity:1}.conv-item .c-del:hover{color:var(--bad)}
.side-ft{padding:8px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.side-ft button,.side-ft a{display:block;width:100%;padding:6px 10px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--card);color:var(--t2);cursor:pointer;font-size:11px;font-family:inherit;text-align:center;text-decoration:none;transition:all 0.12s}
.side-ft button:hover,.side-ft a:hover{border-color:var(--ac);color:var(--ac)}
.side-ft .new-chat{background:var(--ac);color:#fff;border:none;font-weight:500}
.side-ft .new-chat:hover{background:var(--ac2);color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:6px 14px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar select{background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:3px 8px;border-radius:4px;font-size:11px;outline:none;font-family:inherit}
.topbar .sep{flex:1}
.topbar .key-dot{width:6px;height:6px;border-radius:50%}.key-dot.on{background:var(--good)}.key-dot.off{background:var(--bad)}
.topbar span{font-size:10px;color:var(--t3)}
.topbar a{font-size:10px;color:var(--t3);text-decoration:none}
.topbar button{background:none;border:none;color:var(--t2);cursor:pointer;font-size:11px;font-family:inherit;padding:3px 8px;border-radius:4px}
.topbar button:hover{color:var(--ac);background:#f0f0f5}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;max-width:82%;animation:in 0.15s}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes in{from{opacity:0;transform:translateY(4px)}}
.msg .av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.user .av{background:#e8edff;color:var(--ac)}
.msg.ai .av{background:#f0f0f0}
.msg .bubble{padding:10px 14px;border-radius:var(--r2);line-height:1.5;font-size:13px;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:#e8edff;border:1px solid rgba(0,102,255,0.1);border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--card);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.msg.ai .bubble code{background:var(--bg);padding:2px 5px;border-radius:3px;font-size:11px}
.msg.ai .bubble pre{background:#f5f5f7;border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin:6px 0;overflow-x:auto;font-family:'SF Mono',Consolas,monospace;font-size:11px}
.code-block{margin:6px 0}
.pre-btns{display:flex;gap:4px;margin-bottom:6px}
.pre-btns button,.pre-btns a{padding:3px 8px;border-radius:4px;border:1px solid var(--bdr);background:var(--card);color:var(--t2);cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.1s;text-decoration:none}
.pre-btns button:hover{border-color:var(--ac);color:var(--ac)}
.pre-btns .deploy{color:var(--good);border-color:var(--good)}
.pre-btns .btp{color:var(--ac);border-color:var(--ac)}
.pre-btns .apply{color:#7c3aed;border-color:#7c3aed}
.refine-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.refine-row button{padding:3px 10px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--t2);cursor:pointer;font-size:10px;font-family:inherit}
.refine-row button:hover{border-color:var(--ac);color:var(--ac)}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--t2);font-size:14px;line-height:1.8}

/* INPUT */
.input-area{padding:12px 20px 16px;background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0}
.input-row{display:flex;gap:6px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);padding:10px 14px;border-radius:16px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:100px;line-height:1.3;transition:all 0.15s}
.input-row textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,102,255,0.06)}
.input-row textarea::placeholder{color:var(--t3)}
.btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.12s}
.btn-ghost{background:var(--card);border:1px solid var(--bdr);color:var(--t2)}
.btn-ghost:hover{border-color:var(--ac);color:var(--ac)}
.btn-accent{background:var(--ac);color:#fff}.btn-accent:disabled{opacity:0.4}
.btn-rec{background:var(--bad);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(210,0,0,.4)}50%{box-shadow:0 0 0 10px rgba(210,0,0,0)}}
.hint{font-size:9px;color:var(--t3);padding:5px 0 0 12px}
.files-bar{padding:0 20px 4px;display:flex;flex-wrap:wrap;gap:3px}
.file-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;font-size:10px;color:var(--t2)}
.file-chip .x{cursor:pointer;color:var(--t3);font-size:11px}.file-chip .x:hover{color:var(--bad)}

/* RIGHT PANEL */
.panel-toggle{position:fixed;right:12px;top:12px;z-index:20;width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--bdr);color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.panel-overlay{display:none;position:fixed;inset:0;z-index:14;background:rgba(0,0,0,0.3)}
.panel-overlay.show{display:block}
.panel{display:none;position:fixed;right:0;top:0;bottom:0;width:300px;z-index:15;background:var(--card);border-left:1px solid var(--bdr);overflow-y:auto;padding:16px 14px;gap:14px;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,0.1)}
.panel.show{display:flex}
.panel h3{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3);font-weight:600}
.panel input,.panel select{width:100%;padding:6px 8px;border:1px solid var(--bdr);border-radius:var(--r);font-size:10px;outline:none;font-family:inherit;background:var(--bg);margin:3px 0}
.panel input:focus,.panel select:focus{border-color:var(--ac)}
.panel button{width:100%;padding:5px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--card);color:var(--t2);cursor:pointer;font-size:10px;font-family:inherit;margin:2px 0}
.panel button:hover{border-color:var(--ac);color:var(--ac)}
.panel button.primary{background:var(--ac);color:#fff;border:none}

/* PROGRESS */
.progress-panel{display:none;margin:0 20px 4px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;font-family:'SF Mono',Consolas,monospace;font-size:10px;max-height:120px;overflow-y:auto}
.progress-panel.show{display:block}

/* PREVIEW */
.preview-panel{display:none;position:fixed;bottom:0;left:0;right:0;height:65vh;z-index:30;background:var(--card);border-top:2px solid var(--ac);flex-direction:column}
.preview-panel.show{display:flex}
.pp-bar{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr)}
.pp-bar span{font-size:12px;font-weight:600;flex:1}
.pp-bar a,.pp-bar button{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--bdr);background:var(--card);color:var(--ac);cursor:pointer;text-decoration:none;font-family:inherit}
.preview-panel iframe{flex:1;border:none;width:100%}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 16px;border-radius:14px;font-size:11px;z-index:99;opacity:0;pointer-events:none;transition:all 0.25s}
.toast.show{opacity:1}

input[type=file]{display:none}
@media(max-width:768px){.sidebar{display:none}.panel-toggle{right:8px;top:8px}.messages{padding:12px 14px}.input-area{padding:8px 12px}.msg{max-width:92%}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="side-hd">&#x26A1; Workbench</div>
  <div class="side-convs" id="convList"></div>
  <div class="side-ft">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <button onclick="selfReflect()">&#x1F4A1; Self-Reflect</button>
    <a href="/settings.html">Settings</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <select id="model" onchange="onModelChange()"><option value="deepseek-chat">DeepSeek V3</option><option value="deepseek-reasoner">DeepSeek R1</option></select>
    <span class="sep"></span>
    <span class="key-dot off" id="keyDot"></span>
    <input type="password" id="keyInline" placeholder="Paste API Key here then press Enter" style="width:200px;padding:3px 8px;border:1px solid var(--ac);border-radius:4px;font-size:10px;font-family:inherit;outline:none;background:var(--bg)" onkeydown="if(event.key==='Enter'){saveKeyInline();$('input').focus()}">
    <button onclick="saveKeyInline()" style="font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--ac);background:var(--ac);color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap">Save Key</button>
    <a href="/settings.html" style="font-size:10px;color:var(--t3);text-decoration:none;margin-left:2px">Settings</a>
    <span class="sep" style="flex:1"></span>
    <button id="toolsToggleBtn" onclick="var p=document.getElementById('toolsPanel');var o=document.getElementById('panelOverlay');p.classList.toggle('show');o.classList.toggle('show')">&#x2699; Tools</button>
  </div>

  <div class="progress-panel" id="progress"><div style="display:flex;justify-content:space-between"><span style="font-weight:600;color:var(--ac)">Build Progress</span><span onclick="$('progress').classList.remove('show')" style="cursor:pointer">&times;</span></div><div id="progressLog"></div></div>

  <div class="chat-area">
    <div class="messages" id="msgs"><div class="empty-chat"><div><span style="font-size:36px">&#x26A1;</span><br>Describe what you want to build</div></div></div>
    <div class="files-bar" id="attachBar"></div>
    <div class="input-area">
      <div class="input-row">
        <button class="btn btn-ghost" onclick="addFiles()">&#x1F4CE;</button>
        <button class="btn btn-ghost" id="micBtn" onclick="toggleMic()">&#x1F3A4;</button>
        <button class="btn btn-ghost" id="modeBtn" onclick="toggleMode()" title="Switch Code/Joule mode">&#x1F4BB;</button>
        <textarea id="input" rows="1" placeholder="Tell me what to build..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button class="btn btn-accent" id="sendBtn" onclick="send()">&#x27A4;</button>
      </div>
      <div class="hint"><span id="modeLabel">Code Mode</span> · Enter to send · Shift+Enter newline · Drop files</div>
    </div>
  </div>
</div>

<!-- RIGHT TOOLS PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closeTools()"></div>
<div class="panel" id="toolsPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-weight:700;font-size:14px">&#x2699; Tools</span>
    <button onclick="closeTools()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);line-height:1">&times;</button>
  </div>
  <h3>&#x1F3AF; Project Context</h3>
  <select id="projTarget" onchange="saveProjCtx()"><option value="">Target Platform</option><option value="SAP S/4HANA Public Cloud">S/4HANA Public Cloud</option><option value="SAP BTP (Cloud Foundry)">SAP BTP CF</option><option value="Web App">Web App</option><option value="Mobile PWA">Mobile PWA</option><option value="Desktop App">Desktop</option><option value="CLI Tool">CLI Script</option></select>
  <select id="projLang" onchange="saveProjCtx()"><option value="">Language</option><option value="ABAP">ABAP</option><option value="Java">Java</option><option value="Node.js">Node.js</option><option value="Python">Python</option><option value="HTML5/Fiori">HTML5 / Fiori</option><option value="CDS/ODATA">CDS / OData</option></select>
  <input type="text" id="projEnv" placeholder="API / OData endpoint URL..." onchange="saveProjCtx()">
  <div style="display:flex;gap:4px"><input type="text" id="projOrg" placeholder="CF Org" onchange="saveProjCtx()" style="flex:1"><input type="text" id="projSpace" placeholder="CF Space" onchange="saveProjCtx()" style="flex:1"></div>
  <div style="display:flex;gap:4px"><input type="text" id="projUser" placeholder="User" onchange="saveProjCtx()" style="flex:1"><input type="password" id="projPass" placeholder="Password" onchange="saveProjCtx()" style="flex:1"></div>

  <h3 style="margin-top:12px">&#x1F916; SAP Joule (A2A)</h3>
  <p style="font-size:9px;color:var(--t3);margin-bottom:6px">Type in the main chat input. Add <b>/joule</b> prefix for SAP queries.</p>
  <button onclick="checkJouleStatus()">Test Connection</button>

  <h3 style="margin-top:12px">&#x1F4C1; Built Files</h3>
  <div id="fileList" style="font-size:10px;color:var(--t3);max-height:150px;overflow-y:auto"></div>
</div>

<div class="preview-panel" id="previewPanel"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" multiple onchange="onFiles(this)">

<script>
const $=id=>document.getElementById(id);
let conversations,activeConv,pendingFiles=[],sending=false,micOn=false,recognition=null,micRetries=0,builtFiles=[];
try{
  conversations=JSON.parse(localStorage.getItem('wb_convs')||'{}');
}catch(e){conversations={}}
try{activeConv=localStorage.getItem('wb_active')||'default'}catch(e){activeConv='default'}
try{builtFiles=JSON.parse(localStorage.getItem('wb_files')||'[]')}catch(e){builtFiles=[]}
const bf={};
try{if(!conversations[activeConv]) conversations[activeConv]={name:'New Chat',messages:[],created:Date.now()}}catch(e){}

function getProvider(){
  try{
    const p=JSON.parse(localStorage.getItem('ccw_providers')||'[]');
    const d=localStorage.getItem('ccw_default_provider')||'ds';
    let found=p.find(x=>x.key&&x.id===d)||p.find(x=>x.key)||null;
    if(found) return {type:found.type||'deepseek',key:found.key,model:found.model||'deepseek-chat'};
  }catch(e){}
  return {type:'deepseek',key:'',model:'deepseek-chat'};
}
function getActiveKey(){
  const inline=$('keyInline').value.trim();
  return inline||getProvider().key;
}
function saveKeyInline(){
  const key=$('keyInline').value.trim(),model=$('model').value;
  if(!key){toast('Enter an API key first');return}
  localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:'deepseek',key,model,active:true}]));
  localStorage.setItem('ccw_default_provider','ds');
  fetch('/api/config/key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'deepseek',key,model})}).catch(()=>{});
  $('keyDot').className='key-dot on';
  toast('Key saved');
}
async function loadFromServer(){
  try{
    const r=await fetch('/api/config/key');if(!r.ok)return;
    const d=await r.json();
    if(d.key){
      $('keyInline').value=d.key;
      $('model').value=d.model||'deepseek-chat';
      localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:d.type||'deepseek',key:d.key,model:d.model||'deepseek-chat',active:true}]));
      localStorage.setItem('ccw_default_provider','ds');
    }
  }catch(e){}
}
function onModelChange(){
  const k=getActiveKey();if(!k)return;
  localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:'deepseek',key:k,model:$('model').value,active:true}]));
}

// ====== INIT ======
(async function(){
  const p=getProvider();
  if(p.key){
    $('keyInline').value=p.key;$('keyDot').className='key-dot on';$('model').value=p.model||'deepseek-chat';
  }else{
    await loadFromServer();
    if(getProvider().key)$('keyDot').className='key-dot on';
  }
  loadProjCtx();renderSidebar();renderMessages();
})();

window.addEventListener('storage',(e)=>{
  if(e.key==='ccw_providers'||e.key==='ccw_default_provider'){
    const p=getProvider();
    if(p.key){$('keyInline').value=p.key;$('keyDot').className='key-dot on';$('model').value=p.model||'deepseek-chat';}
  }
});
window.addEventListener('pageshow',(e)=>{
  if(e.persisted){
    const p=getProvider();
    if(p.key){$('keyInline').value=p.key;$('keyDot').className='key-dot on';$('model').value=p.model||'deepseek-chat';}
  }
});

// ====== SIDEBAR ======
function renderSidebar(){
  const sorted=Object.entries(conversations).sort((a,b)=>b[1].created-a[1].created);
  $('convList').innerHTML=sorted.map(([id,c])=>`<div class="conv-item${id===activeConv?' active':''}" onclick="switchConv('${id}')"><span class="c-icon">&#x1F4AC;</span><span class="c-name">${esc((c.name==='New Chat'?new Date(c.created).toLocaleDateString():c.name)||'Chat')}</span><span class="c-del" onclick="event.stopPropagation();delConv('${id}')">&times;</span></div>`).join('');
  $('fileList').innerHTML=builtFiles.length?builtFiles.map((f,i)=>`<div style="padding:3px 0;cursor:pointer" onclick="previewFile('${f.url}')">&#x1F4C4; ${esc(f.name)}</div>`).join(''):'No files yet';
}
function switchConv(id){activeConv=id;if(!conversations[id])conversations[id]={name:'New Chat',messages:[],created:Date.now()};saveConvs();renderSidebar();renderMessages()}
function delConv(id){if(Object.keys(conversations).length<=1)return;delete conversations[id];if(activeConv===id)activeConv=Object.keys(conversations)[0];saveConvs();renderSidebar();renderMessages()}
function saveConvs(){localStorage.setItem('wb_convs',JSON.stringify(conversations));localStorage.setItem('wb_active',activeConv)}
function saveFiles(){localStorage.setItem('wb_files',JSON.stringify(builtFiles))}

// ====== PROJECT CONTEXT ======
function saveProjCtx(){const c={target:$('projTarget').value,lang:$('projLang').value,env:$('projEnv').value,org:$('projOrg').value,space:$('projSpace').value,user:$('projUser').value,pass:$('projPass').value};localStorage.setItem('wb_proj_ctx',JSON.stringify(c))}
function loadProjCtx(){try{const c=JSON.parse(localStorage.getItem('wb_proj_ctx')||'{}');if(c.target)$('projTarget').value=c.target;if(c.lang)$('projLang').value=c.lang;if(c.env)$('projEnv').value=c.env;if(c.org)$('projOrg').value=c.org;if(c.space)$('projSpace').value=c.space;if(c.user)$('projUser').value=c.user;if(c.pass)$('projPass').value=c.pass}catch{}}

// ====== MESSAGES ======
function renderMessages(){
  const msgs=conversations[activeConv]?.messages||[];
  $('msgs').innerHTML=msgs.length?msgs.map(m=>renderMsg(m.role,m.text,m.files)).join(''):`<div class="empty-chat"><div><span style="font-size:36px">&#x26A1;</span><br>Describe what you want to build</div></div>`;
  $('msgs').scrollTop=$('msgs').scrollHeight;
}
function renderMsg(role,text,files){
  let h=`<div class="msg ${role==='user'?'user':'ai'}"><div class="av">${role==='user'?'&#x1F464;':'&#x1F916;'}</div>`;
  if(files?.length)h+='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">'+files.map(f=>f.isImage?`<img src="${f.content}" style="max-width:120px;max-height:80px;border-radius:6px;cursor:pointer" onclick="window.open('${f.content}')">`:`<span class="file-chip">&#x1F4C4; ${esc(f.name.slice(0,15))}</span>`).join('')+'</div>';
  h+=`<div class="bubble">${role==='ai'?fmtAI(text):esc(text||'')}</div>`;
  if(role==='ai'&&text?.includes('```'))h+=`<div class="refine-row"><button onclick="refine('Optimize')">&#x26A1; Optimize</button><button onclick="refine('Error handling')">&#x1F6E0; Error handling</button><button onclick="refine('Comments')">&#x1F4DD; Comments</button><button onclick="refine('Fix bugs')">&#x1F41B; Fix bugs</button></div>`;
  return h+'</div>';
}
function addMsg(role,text,files){
  conversations[activeConv].messages.push({role,text,files,time:Date.now()});
  if(conversations[activeConv].name==='New Chat'&&role==='user'&&text)conversations[activeConv].name=text.slice(0,30)+(text.length>30?'...':'');
  saveConvs();renderMessages();renderSidebar();
}

// ====== FORMAT AI ======
function fmtAI(t){return esc(t||'').replace(/```(\w+(?::[^\n]*)?)\n([\s\S]*?)```/g,(_,l,c)=>{const code=c.trim();let lang=l,filePath='';const ci=l.indexOf(':');if(ci>0){lang=l.slice(0,ci);filePath=l.slice(ci+1).trim();}const ext=lang==='html'?'html':lang==='javascript'?'js':lang==='python'?'py':lang||'txt';const isHTML=lang==='html'||code.includes('<!DOCTYPE');const fid='f'+Date.now()+Math.random().toString(36).slice(2,6);bf[fid]={code,ext,lang,filePath};let btp='';try{if(JSON.parse(localStorage.getItem('wb_proj_ctx')||'{}').target?.includes('BTP')&&isHTML)btp=`<button class="btp" onclick="deployBTP('${fid}')">&#x1F310; BTP</button>`}catch{}return`<div class="code-block"><div class="pre-btns"><button onclick="copyBlock(this)">Copy</button><button onclick="editBlock(this,'${fid}')">Edit</button>${isHTML?`<button class="deploy" onclick="deployBlock('${fid}')">&#x25B6; Preview</button>`:`<button class="deploy" onclick="deployBlock('${fid}')">&#x1F4C1; Deploy</button>`}${btp}<button class="apply" onclick="applyBlock('${fid}')">Apply</button><button onclick="downloadBlock(this,'${ext}')">Save</button></div><pre><code contenteditable="false" id="${fid}">${esc(code)}</code></pre></div>`}).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}

// ====== CODE ACTIONS ======
function copyBlock(b){navigator.clipboard.writeText(b.closest('.code-block').querySelector('code').textContent);toast('Copied')}
function editBlock(b,fid){const c=b.closest('.code-block').querySelector('code');if(c.contentEditable==='true'){c.contentEditable='false';c.style.outline='';b.textContent='Edit';bf[fid].code=c.textContent}else{c.contentEditable='true';c.style.outline='2px solid var(--ac)';b.textContent='Done';c.focus()}}
function downloadBlock(b,ext){const c=b.closest('.code-block').querySelector('code').textContent;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c]));a.download='code.'+ext;a.click();toast('Saved')}
async function deployBlock(fid){await deployCode(bf[fid]?.code,'build_'+Date.now()+'.'+(bf[fid]?.ext||'html'))}
async function deployCode(code,fn){
  try{
    const r=await fetch('/api/workbench/build',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,filename:fn})});
    const d=await r.json();
    if(d.ok){builtFiles.unshift({name:fn,url:d.url,time:Date.now()});saveFiles();renderSidebar();showPreview(d.url);toast('Deployed')}else toast('Failed: '+d.error)
  }catch(e){toast('Error')}
}
async function applyBlock(fid){
  const data=bf[fid];if(!data?.code)return toast('No code');
  let fp=data.filePath;
  if(!fp){fp=prompt('Save to file path (relative to project):',fp||'src/newfile.'+data.ext);if(!fp)return}
  prog('Writing '+fp+'...','ac');
  try{
    const r=await fetch('/api/workbench/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filePath:fp,code:data.code})});
    const d=await r.json();
    if(d.ok){prog('Saved: '+d.path+' ('+d.size+' bytes)',d.existed?'warn':'good');toast('Saved to '+d.path);builtFiles.unshift({name:d.path,url:'',time:Date.now()});saveFiles();renderSidebar()}
    else{prog('Failed: '+d.error,'bad');toast(d.error)}
  }catch(e){prog('Error','bad')}
}
async function deployBTP(fid){
  const code=bf[fid]?.code;if(!code)return;
  const ctx=JSON.parse(localStorage.getItem('wb_proj_ctx')||'{}');
  prog('Deploying to BTP...','ac');
  const r=await fetch('/api/btp/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,appName:'fiori-app',config:{api:ctx.env||'',org:ctx.org||'',space:ctx.space||'',user:ctx.user||'',pass:ctx.pass||''}})});
  const d=await r.json();
  if(d.ok){prog(d.cfDeploy?.ok?'Live: '+d.cfDeploy.url:'Package: '+d.packageUrl,'good');addMsg('ai','## BTP Ready\n\n'+d.instructions)}else prog('Failed: '+d.error,'bad')
}
function refine(p){$('input').value=p+': ';$('input').focus()}
function closeTools(){$('toolsPanel').classList.remove('show');$('panelOverlay').classList.remove('show')}
let workbenchMode='code'; // 'code' or 'joule'
function toggleMode(){
  workbenchMode=workbenchMode==='code'?'joule':'code';
  $('modeBtn').innerHTML=workbenchMode==='joule'?'&#x1F3ED;':'&#x1F4BB;';
  $('modeLabel').textContent=workbenchMode==='joule'?'Joule Mode (SAP)':'Code Mode';
  $('input').placeholder=workbenchMode==='joule'?'Ask SAP Joule... (e.g. show sales order 12345)':'Tell me what to build...';
  toast(workbenchMode==='joule'?'Switched to Joule mode':'Switched to Code mode');
}
function showPreview(url){const p=$('previewPanel');p.innerHTML=`<div class="pp-bar"><span>Preview</span><a href="${url}" target="_blank">Open in tab</a><button onclick="this.closest('.preview-panel').classList.remove('show')">Close</button></div><iframe src="${url}"></iframe>`;p.classList.add('show')}
function previewFile(url){showPreview(url)}

// ====== SEND ======
function prog(m,c){const p=$('progress');if(!p)return;p.classList.add('show');const pl=$('progressLog');if(pl)pl.innerHTML+=`<div style="color:var(--${c||'t2'});padding:1px 0">${m}</div>`}
async function send(){
  try{
  const inputEl=$('input');if(!inputEl)return;
  const t=inputEl.value.trim();
  const key=getActiveKey(),model=$('model')?$('model').value:'deepseek-chat';
  if((!t&&!pendingFiles.length)||sending)return;
  if(!key){toast('Paste your API key in the top bar and click Save Key');const ki=$('keyInline');if(ki)ki.focus();return}
  sending=true;const sb=$('sendBtn');if(sb)sb.disabled=true;
  const files=[...pendingFiles];pendingFiles=[];updateFiles();

  const pl=$('progressLog');if(pl)pl.innerHTML='';prog('Thinking...','ac');
  const docIds=[];
  for(const f of files){
    if(f.blob){const form=new FormData();form.append('file',f.blob,f.name);try{const r=await fetch('/api/documents/upload',{method:'POST',body:form});const d=await r.json();if(d.docId)docIds.push({id:d.docId,name:f.name,type:d.metadata?.type||'unknown'});f.docId=d.docId}catch(e){}}
  }
  let c='';
  if(docIds.length){
    c+='[SYSTEM] The user uploaded '+docIds.length+' document(s). These may contain requirements, specifications, or reference material.\n';
    c+='Use document_parse tool to read the FULL content of each document before generating code.\n';
    c+='When generating code, use file path in language tag: ```javascript:path/to/file.js\n';
    c+='Available documents:\n';
    for(const d of docIds)c+=`  docId: ${d.id} — ${d.name} (${d.type})\n`;
  }
  for(const f of files){
    if(!f.isImage){
      const previewLen=f.docId?2000:8000;
      c+=`\n[File: ${f.name}]${f.docId?' (full content via document_parse: '+f.docId+')':''}\n\`\`\`\n${(f.text||'[Binary]').slice(0,previewLen)}\n\`\`\`\n`;
    }
  }
  if(t)c+=t;
  const preview=t||(files.length?'Sent '+files.length+' file(s)':'');
  addMsg('user',preview,files);inputEl.value='';inputEl.style.height='auto';

  if(workbenchMode==='joule'){
    const ctx=JSON.parse(localStorage.getItem('wb_proj_ctx')||'{}');
    prog('Asking SAP Joule...','ac');
    try{
      const r=await fetch('http://localhost:3001/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'joule_chat',params:{query:c,config:{jouleURL:ctx.env||'',clientId:ctx.user||'',clientSecret:ctx.pass||'',tokenURL:(ctx.env||'').replace(/\/api.*$/,'/oauth/token')}}})});
      const d=await r.json();
      if(d.ok)addMsg('ai','## SAP Joule\n\n'+d.answer);
      else addMsg('ai','Joule unavailable: '+(d.error||'No response'));
      prog(d.ok?'Joule responded':'Joule error','good');saveConvs();renderMessages();
    }catch(e){addMsg('ai','Joule error: '+e.message);prog('Error','bad')}
    sending=false;if(sb)sb.disabled=false;inputEl.value='';
    return;
  }

  prog('Calling AI...','ac');
  addMsg('ai','...');
  let aiResponse='',modifiedFiles=[];
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:c,conversationId:activeConv,apiKey:key,model})});
    if(!response.ok){const err=await response.text();throw new Error('Server error: '+response.status+' '+err.slice(0,200))}
    const reader=response.body.getReader();
    const decoder=new TextDecoder();
    let buf='',ev='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lns=buf.split('\n');buf=lns.pop()||'';
      for(const line of lns){
        if(line.startsWith('event: ')){ev=line.slice(7).trim();continue}
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(ev==='token'){aiResponse+=d.text;updateLastAi(aiResponse)}
          else if(ev==='tool_call'){prog(d.tool+'...','warn')}
          else if(ev==='tool_result'){prog(d.tool+': '+(d.result?.ok?'OK':'Failed'),d.result?.ok?'good':'bad');if(d.result?.ok&&(d.tool==='write_file'||d.tool==='edit_file'))modifiedFiles.push(d.result.path||'file')}
          else if(ev==='meta'&&d.conversationId){activeConv=d.conversationId}
          else if(ev==='done'){const finalText=d.text||aiResponse;const extra=modifiedFiles.length?`\n\n<div style="margin-top:8px;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11px"><b>Files modified:</b><br>${modifiedFiles.map(f=>'&#x2705; '+esc(f)).join('<br>')}<br><button onclick="location.reload()" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid var(--ac);background:var(--ac);color:#fff;cursor:pointer;font-size:11px">Reload to apply changes</button></div>`:'';updateLastAi(finalText+extra);prog('Done','good')}
          else if(ev==='error'){prog(d.message||d.code,'bad');if(!aiResponse)updateLastAi('Error: '+d.message)}
        }catch(e){}
      }
    }
  }catch(e){updateLastAi('Error: '+e.message);prog('Failed','bad')}
  sending=false;if(sb)sb.disabled=false;saveConvs();renderSidebar();
  }catch(e){toast('Error: '+e.message);sending=false;const sb=$('sendBtn');if(sb)sb.disabled=false}
}
function updateLastAi(text){
  const msgs=conversations[activeConv].messages;
  if(msgs.length&&msgs[msgs.length-1].role==='ai')msgs[msgs.length-1].text=text;
  renderMessages();
}

// ====== FILES ======
function addFiles(){$('fileInput').click()}
function onFiles(i){for(const f of i.files){const r=new FileReader();r.onload=()=>{pendingFiles.push({name:f.name,content:r.result,isImage:f.type.startsWith('image/'),text:f.type.startsWith('image/')?null:r.result,blob:f});updateFiles()};f.type.startsWith('image/')?r.readAsDataURL(f):r.readAsText(f)}i.value=''}
function updateFiles(){$('attachBar').innerHTML=pendingFiles.map((f,i)=>`<span class="file-chip">${f.isImage?'&#x1F5BC;':'&#x1F4C4;'} ${esc(f.name.slice(0,15))} <span class="x" onclick="pendingFiles.splice(${i},1);updateFiles()">x</span></span>`).join('')}

// ====== VOICE ======
function toggleMic(){micOn?stopMic():startMic()}
function startMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported');return}recognition=new SR();recognition.continuous=false;recognition.lang='zh-CN';recognition.interimResults=true;recognition.onresult=e=>{const t=e.results[0][0].transcript.trim();if(t){$('input').value=($('input').value+' '+t).trim();stopMic();$('input').focus();micRetries=0}};recognition.onerror=e=>{if(e.error==='no-speech'){if(micRetries<2){micRetries++;stopMic();setTimeout(startMic,500);return}toast('No speech')}else if(e.error==='not-allowed')toast('Microphone denied')else if(e.error!=='aborted'&&e.error!=='network')toast('Voice: '+e.error);stopMic();micRetries=0};recognition.onend=()=>{if(micOn)stopMic()};recognition.start();micOn=true;$('micBtn').classList.add('btn-rec')}
function stopMic(){if(recognition){try{recognition.stop()}catch{};recognition=null}micOn=false;$('micBtn').classList.remove('btn-rec')}

// ====== SAP JOULE (A2A) ======
async function checkJouleStatus(){
  let cfg={};
  try{const ctx=JSON.parse(localStorage.getItem('wb_proj_ctx')||'{}');cfg={jouleURL:ctx.env||'',clientId:ctx.user||'',clientSecret:ctx.pass||'',tokenURL:(ctx.env||'').replace(/\/api.*$/,'/oauth/token')}}catch{}
  if(!cfg.jouleURL){toast('Set Joule endpoint in Project Context');return}
  prog('Testing Joule A2A...','ac');
  try{
    const r=await fetch('http://localhost:3001/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'joule_status',params:{config:cfg}})});
    const d=await r.json();
    addMsg('ai',d.connected?'## SAP Joule: Connected\n\n'+cfg.jouleURL:'## SAP Joule: Not Connected\n\n'+d.message);
    prog(d.connected?'Connected':'Failed','good');saveConvs();renderMessages();
  }catch(e){prog('Error','bad')}
}

// ====== SELF-REFLECT ======
async function selfReflect(){
  const key=getActiveKey();if(!key){toast('Set API Key first');return}
  prog('Self-reflecting... reading codebase...','ac');
  const all=Object.values(conversations).flatMap(c=>c.messages||[]).slice(-20);
  const summary=all.map(m=>`[${m.role}]: ${(m.text||'').slice(0,150)}`).join('\n');
  const prompt='[SELF-UPGRADE MODE]\n\n'+
    'You have access to the project workspace. Your goal: improve the Workbench app.\n\n'+
    'Step 1: Use read_file to understand the current codebase:\n'+
    '  - chat-ui.html (the main Workbench frontend)\n'+
    '  - server.js (Express backend)\n'+
    '  - lib/ai-client.js, lib/tool-registry.js, lib/document-parser.js\n\n'+
    'Step 2: Identify ONE concrete improvement (bug fix, UI enhancement, performance, or new feature)\n\n'+
    'Step 3: Use write_file or edit_file to APPLY the change. Do NOT just describe it — actually modify the code.\n\n'+
    'Step 4: After making changes, explain what you changed and why.\n\n'+
    (summary?'Recent conversation context:\n'+summary+'\n\n':'')+
    'IMPORTANT: Actually USE the tools. Make REAL code changes. Be specific.';
  addMsg('ai','...');
  let aiResponse='',modifiedFiles=[];
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:prompt,apiKey:key,model:$('model').value||'deepseek-chat'})});
    const reader=response.body.getReader();
    const decoder=new TextDecoder();
    let buf='',ev='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lns=buf.split('\n');buf=lns.pop()||'';
      for(const line of lns){
        if(line.startsWith('event: ')){ev=line.slice(7).trim();continue}
        if(!line.startsWith('data: '))continue;
        try{const d=JSON.parse(line.slice(6));
          if(ev==='token'){aiResponse+=d.text;updateLastAi(aiResponse)}
          else if(ev==='tool_call'){prog(d.tool+'...','warn')}
          else if(ev==='tool_result'){prog(d.tool+': '+(d.result?.ok?'OK':'Failed'),d.result?.ok?'good':'bad');if(d.result?.ok&&(d.tool==='write_file'||d.tool==='edit_file'))modifiedFiles.push(d.result.path||'file')}
          else if(ev==='done'){const finalText=d.text||aiResponse;const extra=modifiedFiles.length?`\n\n<div style="margin-top:8px;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11px"><b>Files modified:</b><br>${modifiedFiles.map(f=>'&#x2705; '+esc(f)).join('<br>')}<br><button onclick="location.reload()" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid var(--ac);background:var(--ac);color:#fff;cursor:pointer;font-size:11px">Reload to apply changes</button></div>`:'';updateLastAi('## Self-Reflection\n\n'+finalText+extra);prog('Done'+(modifiedFiles.length?' ('+modifiedFiles.length+' files modified)':''),'good')}
          else if(ev==='error'){prog(d.message||d.code,'bad');if(!aiResponse)updateLastAi('Error: '+d.message)}
        }catch(e){}
      }
    }
  }catch(e){updateLastAi('Connection error: '+e.message);prog('Failed','bad')}
  saveConvs();renderSidebar();
}

function newChat(){const id='c_'+Date.now();conversations[id]={name:'New Chat',messages:[],created:Date.now()};activeConv=id;saveConvs();renderSidebar();renderMessages()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

document.addEventListener('dragover',e=>{e.preventDefault()});
document.addEventListener('drop',e=>{e.preventDefault();for(const f of e.dataTransfer.files){const r=new FileReader();r.onload=()=>{pendingFiles.push({name:f.name,content:r.result,isImage:f.type.startsWith('image/'),text:f.type.startsWith('image/')?null:r.result,blob:f});updateFiles()};f.type.startsWith('image/')?r.readAsDataURL(f):r.readAsText(f)}});
document.addEventListener('paste',e=>{for(const it of e.clipboardData?.items||[]){if(it.type.startsWith('image/')){const f=it.getAsFile();const r=new FileReader();r.onload=()=>{pendingFiles.push({name:'paste-'+Date.now()+'.png',content:r.result,isImage:true,blob:f});updateFiles()};r.readAsDataURL(f)}}});
$('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});
</script>
