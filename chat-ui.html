<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Workbench</title>
<link rel="stylesheet" href="/shared/theme.css">
<style>
:root{--safe:env(safe-area-inset-bottom,8px)}
body{height:100dvh;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:240px;flex-shrink:0;background:var(--yh-card);border-right:1px solid var(--yh-border);display:flex;flex-direction:column;overflow:hidden}
.side-hd{padding:18px 16px 12px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.side-hd .theme-toggle{cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;border:none;background:none}
.side-convs{flex:1;overflow-y:auto;padding:4px 10px}
.conv-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--yh-radius);cursor:pointer;font-size:12.5px;color:var(--yh-text2);transition:all var(--yh-transition);margin-bottom:1px;font-weight:450}
.conv-item:hover{background:rgba(0,122,255,0.06);color:var(--yh-text)}
.conv-item.active{background:rgba(0,122,255,0.1);color:var(--yh-accent);font-weight:540}
.conv-item .c-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .c-del{opacity:0;font-size:15px;color:var(--yh-text3);cursor:pointer;flex-shrink:0;padding:0 3px}
.conv-item:hover .c-del{opacity:1}.conv-item .c-del:hover{color:var(--yh-red)}
.side-ft{padding:10px;display:flex;flex-direction:column;gap:5px}
.side-ft button,.side-ft a{display:block;width:100%;padding:8px 12px;border-radius:var(--yh-radius);border:none;background:rgba(0,122,255,0.06);color:var(--yh-text2);cursor:pointer;font-size:12px;font-family:inherit;text-align:center;text-decoration:none;transition:all var(--yh-transition)}
.side-ft button:hover,.side-ft a:hover{background:rgba(0,122,255,0.12);color:var(--yh-text)}
.side-ft .new-chat{background:var(--yh-accent);color:#fff;font-weight:560}
.side-ft .new-chat:hover{background:var(--yh-accent2);color:#fff}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--yh-bg)}

/* Topbar */
.topbar{padding:8px 18px;background:var(--yh-card);border-bottom:1px solid var(--yh-border);display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:5}
.topbar .key-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.key-dot.on{background:var(--yh-green)}.key-dot.off{background:var(--yh-red)}
.topbar .sep{flex:1}
.topbar input[type=password]{width:200px;padding:4px 8px;border:1px solid var(--yh-accent);border-radius:4px;font-size:10px;font-family:inherit;outline:none;background:var(--yh-bg);color:var(--yh-text)}
.topbar select{background:var(--yh-bg);border:1px solid var(--yh-border);color:var(--yh-text);padding:4px 10px;border-radius:var(--yh-radius-sm);font-size:11.5px;outline:none;font-family:inherit;cursor:pointer}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--yh-card);margin:0}
.messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msg{display:flex;gap:10px;max-width:82%;animation:in 0.2s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .av{background:var(--yh-accent);color:#fff}
.msg.ai .av{background:rgba(0,0,0,0.06);color:var(--yh-text2)}
.msg .bubble{padding:11px 16px;border-radius:var(--yh-radius-lg);line-height:1.5;font-size:13.5px;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:var(--yh-accent);color:#fff;border-bottom-right-radius:8px}
.msg.ai .bubble{background:var(--yh-card);border:1px solid var(--yh-border);border-bottom-left-radius:8px}
.msg.ai .bubble code{background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:5px;font-size:11.5px}
.msg.ai .bubble pre{background:rgba(0,0,0,0.03);border:1px solid var(--yh-border);border-radius:10px;padding:12px 14px;margin:8px 0;overflow-x:auto;font-family:var(--yh-mono);font-size:11px;line-height:1.5}
.code-block{margin:8px 0}
.code-block-header{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--yh-bg);border:1px solid var(--yh-border);border-bottom:none;border-radius:8px 8px 0 0;font-size:10.5px;color:var(--yh-text3)}
.code-block-header .lang{font-weight:600;text-transform:uppercase}
.code-block-header .file-path{color:var(--yh-accent);margin-left:4px;font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.code-block-header .actions{margin-left:auto;display:flex;gap:4px}
.code-block-header button{padding:3px 8px;border-radius:4px;border:1px solid var(--yh-border);background:var(--yh-card);color:var(--yh-text2);cursor:pointer;font-size:10px;font-family:inherit}
.code-block-header button:hover{border-color:var(--yh-accent);color:var(--yh-accent)}
.code-block pre{border-radius:0 0 8px 8px;margin-top:0!important}

.streaming-cursor{display:inline-block;width:6px;height:14px;background:var(--yh-accent);animation:blink 0.8s infinite;vertical-align:text-bottom;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--yh-text3);font-size:15px;line-height:1.8;font-weight:450}

/* Preview panel */
.preview-panel{display:none;position:fixed;bottom:0;left:0;right:0;height:65vh;z-index:30;background:var(--yh-card);border-radius:16px 16px 0 0;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.15)}
.preview-panel.show{display:flex}
.pp-bar{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--yh-border)}
.pp-bar span{font-size:13px;font-weight:600;flex:1}
.preview-panel iframe{flex:1;border:none;width:100%}

/* Diff modal */
.diff-modal{display:none;position:fixed;top:0;right:0;bottom:0;width:50%;min-width:400px;z-index:40;background:var(--yh-card);border-left:1px solid var(--yh-border);flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,0.12)}
.diff-modal.show{display:flex}
.diff-hd{padding:12px 16px;border-bottom:1px solid var(--yh-border);display:flex;align-items:center;justify-content:space-between}
.diff-body{flex:1;overflow-y:auto;padding:16px;font-family:var(--yh-mono);font-size:11px;line-height:1.6}
.diff-ft{padding:12px 16px;border-top:1px solid var(--yh-border);display:flex;gap:8px;justify-content:flex-end}

/* Progress bar */
.progress-bar{display:none;margin:0 20px 6px;padding:10px 14px;background:var(--yh-card);border:1px solid var(--yh-border);border-radius:var(--yh-radius);font-family:var(--yh-mono);font-size:10.5px;max-height:130px;overflow-y:auto}
.progress-bar.show{display:block}

/* Input */
.input-area{padding:14px 20px 18px;background:var(--yh-card);border-top:1px solid var(--yh-border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--yh-bg);border:1.5px solid transparent;color:var(--yh-text);padding:11px 16px;border-radius:20px;font-size:13.5px;font-family:inherit;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.35;transition:all 0.2s ease}
.input-row textarea:focus{border-color:var(--yh-accent);box-shadow:0 0 0 3.5px rgba(0,122,255,0.12);background:var(--yh-card)}
.input-row textarea::placeholder{color:var(--yh-text3)}
.btn-accent{background:var(--yh-accent);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,0.3)}.btn-accent:hover{background:var(--yh-accent2);transform:scale(1.04)}.btn-accent:disabled{opacity:0.35;transform:none}
.btn-rec{background:var(--yh-red);color:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0.35)}50%{box-shadow:0 0 0 10px rgba(255,59,48,0)}}
.hint{font-size:10px;color:var(--yh-text3);padding:6px 0 0 14px;font-weight:450}
.files-bar{padding:0 20px 6px;display:flex;flex-wrap:wrap;gap:4px}

/* Files tree sidebar */
.file-tree{max-height:200px;overflow-y:auto;font-size:11px;margin-top:8px}
.file-tree .ft-item{padding:3px 8px;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:4px;color:var(--yh-text2)}
.file-tree .ft-item:hover{background:rgba(0,122,255,0.08);color:var(--yh-accent)}
.file-tree .ft-dir{font-weight:600;color:var(--yh-text)}

/* Panel */
.panel-overlay{display:none;position:fixed;inset:0;z-index:14;background:rgba(0,0,0,0.25);backdrop-filter:blur(4px)}
.panel-overlay.show{display:block}
.panel{display:none;position:fixed;right:0;top:0;bottom:0;width:320px;z-index:15;background:var(--yh-card);border-left:1px solid var(--yh-border);overflow-y:auto;padding:20px 16px;gap:16px;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.1)}
.panel.show{display:flex}
.panel h3{font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--yh-text3);font-weight:600;margin:12px 0 4px}

/* Cmd palette */
.cmd-palette{display:none;position:fixed;top:30%;left:50%;transform:translate(-50%,0);z-index:50;background:var(--yh-card);border:1px solid var(--yh-border);border-radius:12px;padding:8px;width:340px;box-shadow:var(--yh-shadow-lg)}
.cmd-palette.show{display:block}
.cmd-palette input{width:100%;padding:8px 12px;border:none;background:transparent;color:var(--yh-text);font-size:13px;font-family:inherit;outline:none}
.cmd-palette .cmd-list{max-height:200px;overflow-y:auto}
.cmd-palette .cmd-item{padding:7px 12px;cursor:pointer;border-radius:6px;font-size:12px;display:flex;justify-content:space-between}
.cmd-palette .cmd-item:hover,.cmd-palette .cmd-item.selected{background:rgba(0,122,255,0.1);color:var(--yh-accent)}
.cmd-palette .cmd-item kbd{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--yh-bg);color:var(--yh-text3)}

#fileInput{display:none}
@media(max-width:768px){.sidebar{display:none}.messages{padding:16px 18px}.input-area{padding:10px 14px 14px}.msg{max-width:92%}}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="side-hd">
    <span>Workbench</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#x1F31E;</button>
  </div>
  <div class="side-convs" id="convList"></div>
  <div id="fileTree" class="file-tree" style="padding:4px 10px"></div>
  <div class="side-ft">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <button onclick="selfReflect()">Self-Reflect</button>
    <a href="/settings.html">Settings</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <select id="model" onchange="onModelChange()">
      <option value="deepseek-chat">DeepSeek V3</option>
      <option value="deepseek-reasoner">DeepSeek R1</option>
    </select>
    <span class="sep"></span>
    <span class="key-dot off" id="keyDot"></span>
    <input type="password" id="keyInline" placeholder="API Key (Enter to save)" onkeydown="if(event.key==='Enter'){saveKey()}">
    <button class="yh-btn yh-btn-primary" onclick="saveKey()" style="font-size:10px;padding:3px 8px">Save</button>
    <span class="sep"></span>
    <button id="toolsBtn" class="yh-btn" onclick="togglePanel()">&#x2699; Tools</button>
    <span style="font-size:10px;color:var(--yh-text3)" id="usageStats"></span>
  </div>

  <div class="progress-bar" id="progress"><div style="display:flex;justify-content:space-between"><span style="font-weight:600;color:var(--yh-accent)" id="progressTitle">Progress</span><span onclick="$('progress').classList.remove('show')" style="cursor:pointer">&times;</span></div><div id="progressLog"></div></div>

  <div class="chat-area">
    <div class="messages" id="msgs"><div class="empty-chat"><div><div style="font-size:40px;margin-bottom:8px">&#x26A1;</div>Describe what you want to build.<br><span style="font-size:12px;color:var(--yh-text3)">Ctrl+K for commands &nbsp;|&nbsp; Drag files &nbsp;|&nbsp; Paste images</span></div></div></div>
    <div class="files-bar" id="attachBar"></div>
    <div class="input-area">
      <div class="input-row">
        <button class="yh-btn-icon" onclick="addFiles()">&#x1F4CE;</button>
        <button class="yh-btn-icon" id="micBtn" onclick="toggleMic()">&#x1F3A4;</button>
        <textarea id="input" rows="1" placeholder="Tell me what to build... (Ctrl+Enter to send)" onkeydown="handleInputKey(event)"></textarea>
        <button class="yh-btn-icon btn-accent" id="sendBtn" onclick="send()" style="width:42px;height:42px">&#x27A4;</button>
      </div>
      <div class="hint" id="hintText">Enter to send &nbsp;|&nbsp; Shift+Enter newline &nbsp;|&nbsp; Esc to cancel &nbsp;|&nbsp; Ctrl+K commands</div>
    </div>
  </div>
</div>

<!-- Tools Panel -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="panel" id="toolsPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-weight:700;font-size:14px">&#x2699; Tools & Context</span>
    <button onclick="closePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--yh-text3)">&times;</button>
  </div>
  <h3>Project Context</h3>
  <select class="yh-select" id="projTarget" onchange="saveCtx()"><option value="">Target Platform</option><option value="SAP S/4HANA">SAP S/4HANA (ABAP)</option><option value="SAP BTP CF">SAP BTP Cloud Foundry</option><option value="SAP Fiori">SAP Fiori Launchpad</option><option value="Web Static">Web App - Static</option><option value="Web Vue">Web App - Vue.js 3</option><option value="Web React">Web App - React 18</option><option value="Node.js">Node.js / Express</option><option value="Python">Python / FastAPI</option><option value="Java">Java / Spring Boot</option><option value="Mobile PWA">Mobile PWA</option><option value="CLI">CLI Script</option></select>
  <select class="yh-select" id="projLang" onchange="saveCtx()"><option value="">Primary Language</option><option value="ABAP">ABAP (SAP)</option><option value="Fiori/UI5">SAP Fiori / SAPUI5</option><option value="Java">Java (Spring Boot)</option><option value="Node.js">Node.js / Express</option><option value="Python">Python / FastAPI</option><option value="Vue.js">Vue.js 3 (CDN)</option><option value="React">React 18 (CDN)</option><option value="HTML5/CSS/JS">HTML5 / CSS / JS</option><option value="TypeScript">TypeScript</option><option value="CDS/OData">CDS / OData</option></select>
  <input class="yh-input" type="text" id="projEnv" placeholder="API / OData endpoint URL" onchange="saveCtx()">
  <input class="yh-input" type="text" id="projUser" placeholder="Username" onchange="saveCtx()">
  <input class="yh-input" type="password" id="projPass" placeholder="Password" onchange="saveCtx()">
  <h3>Built Files</h3>
  <div id="fileList" style="font-size:11px;color:var(--yh-text3);max-height:180px;overflow-y:auto"></div>
</div>

<!-- Diff Modal -->
<div class="diff-modal" id="diffModal">
  <div class="diff-hd">
    <span style="font-weight:600">Code Changes</span>
    <button onclick="closeDiff()" style="background:none;border:none;font-size:18px;cursor:pointer">&times;</button>
  </div>
  <div class="diff-body" id="diffBody"></div>
  <div class="diff-ft">
    <button class="yh-btn" onclick="closeDiff()">Cancel</button>
    <button class="yh-btn yh-btn-primary" onclick="confirmApply()">Apply Changes</button>
  </div>
</div>

<!-- Command Palette -->
<div class="cmd-palette" id="cmdPalette">
  <input type="text" id="cmdInput" placeholder="Type a command..." oninput="filterCmds()" onkeydown="handleCmdKey(event)">
  <div class="cmd-list" id="cmdList"></div>
</div>

<!-- Preview Panel -->
<div class="preview-panel" id="previewPanel"></div>

<!-- Toast -->
<div class="yh-toast" id="toast"></div>

<input type="file" id="fileInput" multiple onchange="onFiles(this)">

<script src="/shared/utils.js"></script>
<script>
const $=Y.$;
let conversations, activeConv, pendingFiles=[], sending=false, micOn=false, recognition=null, builtFiles=[];
let currentStreamEl=null, streamingContent='', pendingDiff=null, theme='light';

try{conversations=JSON.parse(localStorage.getItem('wb_convs')||'{}')}catch{conversations={}}
try{activeConv=localStorage.getItem('wb_active')||'default'}catch{activeConv='default'}
try{builtFiles=JSON.parse(localStorage.getItem('wb_files')||'[]')}catch{builtFiles=[]}
try{theme=localStorage.getItem('yh_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')}catch{theme='light'}
if(!conversations[activeConv])conversations[activeConv]={name:'New Chat',messages:[],created:Date.now()};

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  document.querySelector('.theme-toggle').textContent=theme==='dark'?'☀️':'🌞';
  localStorage.setItem('yh_theme',theme);
}
if(theme==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').textContent='☀️';}

// Commands
const commands=[
  {name:'New Chat',key:'Ctrl+N',action:newChat},
  {name:'Toggle Theme',key:'Ctrl+T',action:toggleTheme},
  {name:'Toggle Tools Panel',key:'Ctrl+Shift+P',action:togglePanel},
  {name:'Clear Chat',key:'Ctrl+L',action:()=>{conversations[activeConv].messages=[];save();renderMsgs();renderSidebar()}},
  {name:'Export Chat',key:'Ctrl+E',action:exportChat},
  {name:'Self-Reflect',key:'Ctrl+R',action:selfReflect},
  {name:'Focus Input',key:'Ctrl+I',action:()=>$('input').focus()},
];
function filterCmds(){
  const q=$('cmdInput').value.toLowerCase();
  $('cmdList').innerHTML=commands.filter(c=>c.name.toLowerCase().includes(q)).map((c,i)=>
    `<div class="cmd-item${i===0?' selected':''}" onclick="runCmd('${c.name}')"><span>${c.name}</span><kbd>${c.key||''}</kbd></div>`
  ).join('');
}
function handleCmdKey(e){
  if(e.key==='Escape'){$('cmdPalette').classList.remove('show');$('input').focus()}
  if(e.key==='Enter'){const sel=document.querySelector('.cmd-item.selected');if(sel)sel.click()}
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    const items=document.querySelectorAll('.cmd-item');
    const idx=Array.from(items).findIndex(el=>el.classList.contains('selected'));
    items[idx]?.classList.remove('selected');
    const next=items[e.key==='ArrowDown'?Math.min(idx+1,items.length-1):Math.max(idx-1,0)];
    if(next)next.classList.add('selected');
  }
}
function runCmd(name){$('cmdPalette').classList.remove('show');const c=commands.find(c=>c.name===name);if(c)c.action();}

Y.bindShortcut('ctrl+k',(e)=>{e.preventDefault();$('cmdPalette').classList.toggle('show');if($('cmdPalette').classList.contains('show')){$('cmdInput').value='';filterCmds();$('cmdInput').focus()}});
Y.bindShortcut('ctrl+n',()=>newChat());
Y.bindShortcut('ctrl+l',()=>{conversations[activeConv].messages=[];save();renderMsgs();renderSidebar()});
Y.bindShortcut('ctrl+t',()=>toggleTheme());
Y.bindShortcut('ctrl+r',()=>selfReflect());
Y.bindShortcut('ctrl+i',()=>$('input').focus());

function handleInputKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
  else if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();send()}
  else if(e.key==='Escape'&&sending){cancelRequest()}
}

// Provider
function getProvider(){
  try{
    const p=JSON.parse(localStorage.getItem('ccw_providers')||'[]');
    const d=localStorage.getItem('ccw_default_provider')||'ds';
    let found=p.find(x=>x.key&&x.id===d)||p.find(x=>x.key)||null;
    if(found)return{type:found.type||'deepseek',key:found.key,model:found.model||'deepseek-chat'};
  }catch{}
  return{type:'deepseek',key:'',model:'deepseek-chat'};
}
function getActiveKey(){return $('keyInline').value.trim()||getProvider().key}
function saveKey(){
  const key=$('keyInline').value.trim(),model=$('model').value;
  if(!key){Y.toast('Enter an API key first');return}
  localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:'deepseek',key,model,active:true}]));
  localStorage.setItem('ccw_default_provider','ds');
  fetch('/api/config/key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'deepseek',key,model})}).catch(()=>{});
  $('keyDot').className='key-dot on';
  Y.toast('Key saved');
}

async function loadServerKey(){
  try{
    const r=await fetch('/api/config/key');if(!r.ok)return;
    const d=await r.json();
    if(d.key){$('keyInline').value=d.key;$('model').value=d.model||'deepseek-chat';
    localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:d.type||'deepseek',key:d.key,model:d.model||'deepseek-chat',active:true}]));localStorage.setItem('ccw_default_provider','ds')}
  }catch{}
}
function onModelChange(){
  const k=getActiveKey();if(!k)return;
  localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type:'deepseek',key:k,model:$('model').value,active:true}]));
}

// Init
(async function(){
  const p=getProvider();
  if(p.key){$('keyInline').value=p.key;$('keyDot').className='key-dot on';$('model').value=p.model||'deepseek-chat'}
  else{await loadServerKey();if(getProvider().key)$('keyDot').className='key-dot on'}

// Format AI
function fmtAI(t){
  return Y.esc(t||'')
    .replace(/```(\w+)?(?::(\S+))?\n([\s\S]*?)```/g,(_,lang,filePath,code)=>{
      const l=lang||'code',fp=filePath||'',c=code.trim();
      const fid='f'+Date.now()+Math.random().toString(36).slice(2,6);
      window['_bf']=window['_bf']||{};
      window['_bf'][fid]={code:c,lang:l,filePath:fp};
      const isHTML=l==='html'||c.includes('<!DOCTYPE');
      return`<div class="code-block"><div class="code-block-header"><span class="lang">${l}</span>${fp?`<span class="file-path">${Y.esc(fp)}</span>`:''}<span class="actions"><button onclick="copyBlock('${fid}')">Copy</button><button onclick="editBlock('${fid}')">Edit</button>${isHTML?`<button onclick="previewBlock('${fid}')">Preview</button>`:`<button onclick="saveBlock('${fid}')">Deploy</button>`}${fp?`<button onclick="applyBlock('${fid}')" style="color:var(--yh-purple)">Apply</button>`:''}<button onclick="integrateBlock('${fid}')" style="color:var(--yh-green);font-weight:600" title="Auto-detect path & add to project">&#x2B50; Add to Project</button></span></div><pre><code id="${fid}">${Y.esc(c)}</code></pre></div>`;
    })
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
}

// Send (SSE streaming)
function prog(m,c){const p=$('progress');p.classList.add('show');$('progressLog').innerHTML+=`<div style="color:var(--yh-${c||'text2'});padding:1px 0">${m}</div>`}
async function send(){
  try{
  const inputEl=$('input');const t=inputEl.value.trim();
  const key=getActiveKey(),model=$('model').value;
  if((!t&&!pendingFiles.length)||sending)return;
  if(!key){Y.toast('Paste your API key in the top bar and click Save');$('keyInline').focus();return}
  sending=true;$('sendBtn').disabled=true;

  const files=[...pendingFiles];pendingFiles=[];updateFiles();
  $('progressLog').innerHTML='';prog('Streaming...','ac');

  const docIds=[];
  for(const f of files){
    if(f.blob){const form=new FormData();form.append('file',f.blob,f.name);
    try{const r=await fetch('/api/documents/upload',{method:'POST',body:form});const d=await r.json();if(d.docId)docIds.push({id:d.docId,name:f.name})}catch{}}
  }
  // Build messages with language-specific prompt + document context
  let msgs=[{role:'system',content:getLangPrompt()}];
  if(docIds.length){
    msgs.push({role:'system',content:'Documents available: '+docIds.map(d=>`docId:${d.id} (${d.name})`).join(', ')+'. Use document_parse tool to read them. After reading, generate code that fulfills any requirements/specs found in the documents.'});
  }
  for(const f of files){
    if(!f.isImage)msgs.push({role:'user',content:`[File: ${f.name}]\n${(f.text||'').slice(0,3000)}`});
  }
  if(t)msgs.push({role:'user',content:t});
  if(!msgs.length)return;

  const preview=t||'Sent '+files.length+' file(s)';
  addMsg('user',preview,files);inputEl.value='';inputEl.style.height='auto';

  // Add empty AI message for streaming
  addMsg('ai','...');
  streamingContent='';

  // Use SSE streaming
  const resp=await fetch('/api/chat/stream',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:msgs,model,tools:true})
  });

  const reader=resp.body.getReader();
  const decoder=new TextDecoder();
  let buffer='';

  while(true){
    const{value,done}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');
    buffer=lines.pop()||'';

    for(const line of lines){
      const trimmed=line.trim();
      if(!trimmed||!trimmed.startsWith('data: '))continue;
      try{
        const data=JSON.parse(trimmed.slice(6));
        if(data.type==='token'){
          streamingContent+=data.text;
          updateLastAi(streamingContent+'<span class="streaming-cursor"></span>');
        }else if(data.type==='done'){
          updateLastAi(data.content||streamingContent);
          prog('Done','green');
        }else if(data.type==='error'){
          updateLastAi('Error: '+data.message);
          prog(data.message,'red');
        }else if(data.type==='tool_call'){
          prog('🔧 '+data.tool+': '+JSON.stringify(data.params||{}).slice(0,80),'text2');
        }else if(data.type==='tool_result'){
          const ok=data.result?.ok?'✅':'❌';
          prog(ok+' '+data.tool+' done','text2');
        }
      }catch{}
    }
  }
  // Update usage stats
  fetch('/api/health').then(r=>r.json()).then(d=>{
    if(d.usage){$('usageStats').textContent=`Tokens: ${(d.usage.tokensIn/1000).toFixed(1)}k in / ${(d.usage.tokensOut/1000).toFixed(1)}k out | ${d.usage.requests} req`}
  }).catch(()=>{});

  sending=false;$('sendBtn').disabled=false;
  }catch(e){Y.toast('Error: '+e.message);sending=false;$('sendBtn').disabled=false;updateLastAi('Error: '+e.message)}
}
function cancelRequest(){
  sending=false;$('sendBtn').disabled=false;
  if(streamingContent)updateLastAi(streamingContent+'\n\n[Canceled]');
  streamingContent='';currentStreamEl=null;
}

  const msgs=conversations[activeConv]?.messages||[];
  const text=msgs.map(m=>`[${m.role==='user'?'You':'AI'}] ${m.text||''}`).join('\n\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text]));a.download='chat-export.txt';a.click();
}

function newChat(){const id='c_'+Date.now();conversations[id]={name:'New Chat',messages:[],created:Date.now()};activeConv=id;save();renderSidebar();renderMsgs()}

// Drag/drop & paste
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();for(const f of e.dataTransfer.files){const r=new FileReader();r.onload=()=>{pendingFiles.push({name:f.name,content:r.result,isImage:f.type.startsWith('image/'),text:f.type.startsWith('image/')?null:r.result,blob:f});updateFiles()};f.type.startsWith('image/')?r.readAsDataURL(f):r.readAsText(f)}});
document.addEventListener('paste',e=>{for(const it of e.clipboardData?.items||[]){if(it.type.startsWith('image/')){const f=it.getAsFile();const r=new FileReader();r.onload=()=>{pendingFiles.push({name:'paste-'+Date.now()+'.png',content:r.result,isImage:true,blob:f});updateFiles()};r.readAsDataURL(f)}}});
$('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});
</script>
</body>
</html>
