<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
:root{--bg:#f5f6f7;--srf:#fff;--bdr:#e0e3e8;--txt:#1d2d3e;--t2:#556b82;--t3:#8b95a5;--ac:#0070f2;--a2:#0057b8;--gr:linear-gradient(135deg,#0070f2,#0057b8);--bad:#d20a0a;--good:#188918;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.topbar{padding:14px 20px;background:var(--srf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;font-weight:700;font-size:16px}
.topbar span{background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar a{color:var(--t2);text-decoration:none;font-size:13px;margin-left:auto}.topbar a:hover{color:var(--ac)}
.container{max-width:720px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--srf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--bdr);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-hd .badge{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(129,140,248,0.15);color:var(--ac);font-weight:500}
.card-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
label{font-size:12px;color:var(--t2);display:flex;flex-direction:column;gap:4px}
input,textarea,select{padding:10px 14px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--txt);font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus{border-color:var(--ac)}
.row{display:flex;gap:10px}.row>*{flex:1}
button{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;border:none;font-weight:500;transition:all 0.15s}
.btn-primary{background:var(--gr);color:#fff}.btn-primary:hover{opacity:0.9}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--t2)}.btn-ghost:hover{color:var(--txt);border-color:var(--ac)}
.provider-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:6px}
.provider-row.active{border:1px solid var(--ac);background:rgba(129,140,248,0.06)}
.provider-row .name{width:100px;font-size:13px;font-weight:600;flex-shrink:0}
.provider-row input{flex:1}
.provider-row .provider-select{width:120px;flex-shrink:0}
.provider-row .status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.provider-row .status.on{background:var(--good);box-shadow:0 0 6px rgba(52,211,153,0.5)}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(37,39,64,0.95);color:#fff;padding:10px 20px;border-radius:16px;font-size:12px;z-index:99;opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1}
.mcp-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:12px;margin-bottom:4px}
.mcp-item .mcp-name{flex:1;font-weight:600}
.mcp-item .mcp-url{color:var(--t3);font-size:11px}
.mcp-item button{background:transparent;border:1px solid var(--bdr);color:var(--bad);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px}
@media(max-width:640px){.container{padding:12px 8px}.row{flex-direction:column}.provider-row{flex-wrap:wrap;gap:6px}.provider-row .name{width:100%}.provider-row input{width:100%}.provider-row select{width:48%!important}}
</style>
</head>
<body>
<div class="topbar"><span>&#x2699; Settings</span><a href="/">Home</a></div>

<div class="container">

  <!-- AI Providers -->
  <div class="card">
    <div class="card-hd">&#x1F916; AI Model Providers <span class="badge">All apps share these keys</span></div>
    <div class="card-body">
      <div id="providers">
        <!-- Generated by JS -->
      </div>
      <button class="btn-ghost" onclick="addProvider()" style="align-self:flex-start">+ Add Provider</button>
    </div>
  </div>

  <!-- Defaults -->
  <div class="card">
    <div class="card-hd">Default Settings</div>
    <div class="card-body">
      <div class="row">
        <label>Default Provider
          <select id="defaultProvider" onchange="saveAll()"></select>
        </label>
        <label>Max Output Tokens
          <input type="number" id="maxTokens" value="8192" onchange="saveAll()">
        </label>
      </div>
    </div>
  </div>

  <!-- MCP -->
  <div class="card">
    <div class="card-hd">MCP Servers</div>
    <div class="card-body">
      <div id="mcpList"></div>
      <div class="row">
        <input type="text" id="mcpName" placeholder="Server name">
        <input type="text" id="mcpUrl" placeholder="Endpoint URL">
      </div>
      <button class="btn-primary" onclick="addMcp()">+ Add MCP Server</button>
    </div>
  </div>

  <!-- SFTP -->
  <div class="card">
    <div class="card-hd">SFTP Server</div>
    <div class="card-body">
      <div class="row"><label>Host<input type="text" id="sftpHost" onchange="saveAll()"></label><label>Port<input type="number" id="sftpPort" value="22" onchange="saveAll()"></label></div>
      <div class="row"><label>Username<input type="text" id="sftpUser" onchange="saveAll()"></label><label>Password<input type="password" id="sftpPass" onchange="saveAll()"></label></div>
      <label>Remote Path<input type="text" id="sftpPath" value="/uploads" onchange="saveAll()"></label>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ====== Multi-Provider Config ======
const PROVIDER_TYPES = {
  deepseek: { name:'DeepSeek', models:['deepseek-chat','deepseek-reasoner'], baseURL:'https://api.deepseek.com/v1/chat/completions' },
  openai: { name:'OpenAI / ChatGPT', models:['gpt-4o','gpt-4o-mini','gpt-4-turbo','o3-mini'], baseURL:'https://api.openai.com/v1/chat/completions' },
  anthropic: { name:'Anthropic / Claude', models:['claude-sonnet-4-6','claude-opus-4-7','claude-haiku-4-5'], baseURL:'https://api.anthropic.com/v1/messages' },
  custom: { name:'Custom (OpenAI-compatible)', models:['custom-model'], baseURL:'' }
};

const DEFAULT_PROVIDERS = [
  { id:'ds', type:'deepseek', key:'', model:'deepseek-chat', active:true },
];

function loadProviders(){ try{return JSON.parse(localStorage.getItem('ccw_providers')||'null')||DEFAULT_PROVIDERS}catch{return DEFAULT_PROVIDERS} }
function saveProviders(p){ localStorage.setItem('ccw_providers',JSON.stringify(p)) }
function saveAll(){ saveProviders(providers); localStorage.setItem('ccw_default_provider',document.getElementById('defaultProvider')?.value||'ds'); localStorage.setItem('ccw_max_tokens',document.getElementById('maxTokens')?.value||'8192'); ['sftpHost','sftpPort','sftpUser','sftpPass','sftpPath'].forEach(k=>localStorage.setItem('sftp_'+k.replace('sftp','').toLowerCase(),document.getElementById(k)?.value||'')); toast('Saved') }

let providers=loadProviders();

function renderProviders(){
  const el=document.getElementById('providers');
  el.innerHTML=providers.map((p,i)=>{
    const pt=PROVIDER_TYPES[p.type]||PROVIDER_TYPES.custom;
    return `<div class="provider-row${p.active?' active':''}">
      <span class="status${p.active&&p.key?' on':''}"></span>
      <select class="provider-select" onchange="providers[${i}].type=this.value;saveProviders(providers);renderProviders()">
        ${Object.entries(PROVIDER_TYPES).map(([k,v])=>`<option value="${k}"${p.type===k?' selected':''}>${v.name}</option>`).join('')}
      </select>
      <select style="width:150px" onchange="providers[${i}].model=this.value;saveProviders(providers);renderProviders()">
        ${pt.models.map(m=>`<option value="${m}"${p.model===m?' selected':''}>${m}</option>`).join('')}
      </select>
      <input type="password" value="${p.key}" placeholder="API Key" onchange="providers[${i}].key=this.value;providers[${i}].active=!!this.value;saveProviders(providers);renderProviders()">
      <button class="btn-ghost" style="padding:4px 8px;font-size:10px" onclick="providers.splice(${i},1);saveProviders(providers);renderProviders()">✕</button>
    </div>`;
  });

  // Update default provider dropdown
  const dp=document.getElementById('defaultProvider');
  dp.innerHTML=providers.filter(p=>p.active).map(p=>{
    const pt=PROVIDER_TYPES[p.type];
    return `<option value="${p.id}"${(localStorage.getItem('ccw_default_provider')||'ds')===p.id?' selected':''}>${pt.name} (${p.model})</option>`;
  }).join('');
  if(!providers.filter(p=>p.active).length) dp.innerHTML='<option>No active provider</option>';

  document.getElementById('maxTokens').value=localStorage.getItem('ccw_max_tokens')||'8192';
}

function addProvider(){
  const id='p_'+Date.now();
  providers.push({id,type:'deepseek',key:'',model:'deepseek-chat',active:false});
  saveProviders(providers);renderProviders();
}

// MCP
function renderMcp(){
  const servers=JSON.parse(localStorage.getItem('mcp_servers')||'[]');
  document.getElementById('mcpList').innerHTML=servers.map((s,i)=>`<div class="mcp-item"><span class="mcp-name">${esc(s.name)}</span><span class="mcp-url">${esc(s.url)}</span><button onclick="removeMcp(${i})">Remove</button></div>`).join('');
}
function addMcp(){
  const name=document.getElementById('mcpName').value.trim(),url=document.getElementById('mcpUrl').value.trim();
  if(!name||!url)return;
  const servers=JSON.parse(localStorage.getItem('mcp_servers')||'[]');
  servers.push({name,url});localStorage.setItem('mcp_servers',JSON.stringify(servers));
  document.getElementById('mcpName').value='';document.getElementById('mcpUrl').value='';renderMcp();toast('MCP server added');
}
function removeMcp(i){const s=JSON.parse(localStorage.getItem('mcp_servers')||'[]');s.splice(i,1);localStorage.setItem('mcp_servers',JSON.stringify(s));renderMcp()}

// SFTP load
function loadSftp(){
  ['Host','Port','User','Pass','Path'].forEach(k=>{const el=document.getElementById('sftp'+k);if(el)el.value=localStorage.getItem('sftp_'+k.toLowerCase())||(k==='Port'?'22':k==='Path'?'/uploads':''))});
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

renderProviders();renderMcp();loadSftp();
</script>
</body>
</html>
