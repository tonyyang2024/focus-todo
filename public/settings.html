<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Focus Hub</title>
<style>
:root{--bg:#f5f5f5;--card:#fff;--bdr:#e5e5e5;--txt:#111;--t2:#666;--t3:#999;--ac:#0070f2;--bad:#d20a0a;--good:#188918;--r:6px;--r2:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
nav{background:var(--card);border-bottom:1px solid var(--bdr);padding:0 20px;height:44px;display:flex;align-items:center;gap:16px}
nav a{color:var(--t2);text-decoration:none;font-size:13px}.nav a:hover{color:var(--txt)}
nav h1{font-size:14px;font-weight:600}
.container{max-width:560px;margin:32px auto;padding:0 16px;display:flex;flex-direction:column;gap:24px}

.section{}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3);margin-bottom:8px;font-weight:600}

.row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r2);margin-bottom:6px}
.row .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--bdr)}
.row .dot.on{background:var(--good)}
.row .lbl{width:70px;font-size:12px;color:var(--t2);flex-shrink:0}
.row input,.row select{padding:8px 10px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;outline:none;font-family:inherit;flex:1;background:var(--bg)}
.row input:focus,.row select:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,112,242,0.1)}
.row button{border:none;background:none;color:var(--bad);cursor:pointer;font-size:16px;padding:0 4px}

.mcp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:4px;font-size:12px}
.mcp-item .name{font-weight:600;flex:1}
.mcp-item .url{color:var(--t2);font-size:11px}
.mcp-item button{color:var(--bad);background:none;border:none;cursor:pointer;font-size:14px}

.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:var(--card);color:var(--txt);transition:all 0.15s}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.btn.primary{background:var(--ac);color:#fff;border:none;padding:7px 16px}
.btn.primary:hover{opacity:0.9}

.add-row{display:flex;gap:8px;margin-top:6px}
.add-row input{flex:1;padding:8px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;outline:none;font-family:inherit;background:var(--card)}
.add-row input:focus{border-color:var(--ac)}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 18px;border-radius:16px;font-size:12px;z-index:99;opacity:0;transition:all 0.25s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.container{padding:16px 12px;margin:16px auto}.row{flex-wrap:wrap}.row .lbl{width:100%}}
</style>
</head>
<body>
<nav>
  <h1>Settings</h1>
  <a href="/" style="margin-left:auto">Back to Hub</a>
</nav>
<div class="container">

  <div class="section">
    <div class="section-title">API Provider</div>
    <div class="row">
      <span class="dot on" id="keyDot"></span>
      <span class="lbl">Provider</span>
      <select id="sProvider" onchange="onProviderChange();onSettingChange()">
        <option value="deepseek">DeepSeek</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
      </select>
      <select id="sModel" onchange="onSettingChange()">
        <option>deepseek-chat</option>
      </select>
    </div>
    <div class="row">
      <span class="lbl">API Key</span>
      <input type="password" id="sKey" placeholder="Paste API key here..." oninput="saveKey()" onchange="onSettingChange()">
    </div>
  </div>

  <div class="section">
    <div class="section-title">MCP Servers</div>
    <div id="mcpList"></div>
    <div class="add-row">
      <input type="text" id="mcpName" placeholder="Server name">
      <input type="text" id="mcpUrl" placeholder="https://...">
      <button class="btn primary" onclick="addMcp()">Add</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">SFTP Server</div>
    <div class="row"><span class="lbl">Host</span><input id="sftpHost" placeholder="Host" oninput="saveSftp()"></div>
    <div class="row"><span class="lbl">Port</span><input id="sftpPort" value="22" oninput="saveSftp()"></div>
    <div class="row"><span class="lbl">User</span><input id="sftpUser" placeholder="Username" oninput="saveSftp()"></div>
    <div class="row"><span class="lbl">Pass</span><input type="password" id="sftpPass" placeholder="Password" oninput="saveSftp()"></div>
    <div class="row"><span class="lbl">Path</span><input id="sftpPath" value="/uploads" oninput="saveSftp()"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const models={deepseek:['deepseek-chat','deepseek-reasoner'],openai:['gpt-4o','gpt-4o-mini','gpt-4-turbo'],anthropic:['claude-sonnet-4-6','claude-opus-4-7','claude-haiku-4-5']};

function loadKey(){
  const p=JSON.parse(localStorage.getItem('ccw_providers')||'[]');
  const def=localStorage.getItem('ccw_default_provider')||'ds';
  const active=p.find(x=>x.active&&x.id===def)||p.find(x=>x.active)||{type:'deepseek',key:'',model:'deepseek-chat'};
  document.getElementById('sProvider').value=active.type;
  document.getElementById('sKey').value=active.key||'';
  document.getElementById('keyDot').className='dot'+(active.key?' on':'');
  onProviderChange(active.model);
}

function onProviderChange(model){
  const t=document.getElementById('sProvider').value;
  const m=document.getElementById('sModel');
  m.innerHTML=(models[t]||['custom']).map(x=>`<option${x===model?' selected':''}>${x}</option>`).join('');
}
function onSettingChange(){saveKey();}

function saveKey(){
  const type=document.getElementById('sProvider').value;
  const key=document.getElementById('sKey').value.trim();
  const model=document.getElementById('sModel').value;
  localStorage.setItem('ccw_providers',JSON.stringify([{id:'ds',type,key,model,active:!!key}]));
  localStorage.setItem('ccw_default_provider','ds');
  document.getElementById('keyDot').className='dot'+(key?' on':'');
  if(key) toast('API Key 已保存');
}

function renderMcp(){
  const s=JSON.parse(localStorage.getItem('mcp_servers')||'[]');
  document.getElementById('mcpList').innerHTML=s.map((x,i)=>`<div class="mcp-item"><span class="name">${esc(x.name)}</span><span class="url">${esc(x.url)}</span><button onclick="delMcp(${i})">&times;</button></div>`).join('');
}
function addMcp(){
  const n=document.getElementById('mcpName').value.trim();
  const u=document.getElementById('mcpUrl').value.trim();
  if(!n||!u){alert('Please enter both name and URL');return}
  const s=JSON.parse(localStorage.getItem('mcp_servers')||'[]');
  s.push({name:n,url:u});
  localStorage.setItem('mcp_servers',JSON.stringify(s));
  document.getElementById('mcpName').value='';document.getElementById('mcpUrl').value='';
  renderMcp();toast('Added');
}
function delMcp(i){const s=JSON.parse(localStorage.getItem('mcp_servers')||'[]');s.splice(i,1);localStorage.setItem('mcp_servers',JSON.stringify(s));renderMcp()}

function saveSftp(){
  ['host','port','user','pass','path'].forEach(k=>localStorage.setItem('sftp_'+k,document.getElementById('sftp'+k.charAt(0).toUpperCase()+k.slice(1)).value));
}
function loadSftp(){
  ['Host','Port','User','Pass','Path'].forEach(k=>{
    const el=document.getElementById('sftp'+k);
    if(el)el.value=localStorage.getItem('sftp_'+k.toLowerCase())||(k==='Port'?'22':k==='Path'?'/uploads':'');
  });
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

loadKey();renderMcp();loadSftp();
</script>
</body>
</html>
