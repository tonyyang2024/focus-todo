<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1b2e">
<title>Skill Copilot</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #1a1b2e; --bg2: #212339; --surface: #252740;
    --border: #2e3150; --text: #e4e5f0; --text2: #9496b0; --text3: #6b6d85;
    --accent: #818cf8; --accent2: #a78bfa; --accent3: #c084fc;
    --good: #34d399; --bad: #f87171; --warn: #f59e0b;
    --gradient: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
    --radius: 14px; --radius-sm: 10px;
    --sidebar-w: 240px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(129,140,248,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(192,132,252,0.04) 0%, transparent 50%);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 10;
  }
  .sidebar-header {
    padding: 20px 16px 12px; flex-shrink: 0;
  }
  .sidebar-header h2 {
    font-size: 15px; font-weight: 700;
    background: var(--gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* Spaces */
  .spaces-section { padding: 0 12px; flex-shrink: 0; }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text3); padding: 8px 4px 6px; font-weight: 600;
  }
  .space-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-size: 12px; color: var(--text2);
    transition: all 0.15s; margin-bottom: 2px;
  }
  .space-item:hover { background: rgba(129,140,248,0.06); color: var(--text); }
  .space-item.active { background: rgba(129,140,248,0.12); color: var(--accent); font-weight: 600; }
  .space-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .space-item .count { margin-left: auto; font-size: 10px; color: var(--text3); }
  .thread-item {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 8px 5px 12px; border-radius: 6px;
    cursor: pointer; font-size: 11px; color: var(--text3);
    transition: all 0.15s; margin-left: 8px; margin-bottom: 1px;
  }
  .thread-item:hover { background: rgba(129,140,248,0.05); color: var(--text2); }
  .thread-item.active { background: rgba(129,140,248,0.1); color: var(--accent); }
  .thread-del { opacity: 0; font-size: 14px; color: var(--text3); cursor: pointer; flex-shrink: 0; }
  .thread-item:hover .thread-del { opacity: 1; }
  .thread-del:hover { color: var(--bad); }
  .new-thread-btn {
    display: block; width: 100%; padding: 5px 12px; border-radius: 8px; cursor: pointer;
    font-size: 11px; color: var(--text3); background: none; border: 1px dashed var(--border);
    transition: all 0.15s; font-family: inherit; margin: 4px 0 4px 8px; text-align: left;
  }
  .new-thread-btn:hover { color: var(--accent2); border-color: var(--accent2); }
  .new-space-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    font-size: 11px; color: var(--text3); transition: all 0.15s;
    border: 1px dashed var(--border); background: none; width: 100%;
    margin-top: 4px; font-family: inherit;
  }
  .new-space-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* Skills in sidebar */
  .skills-section { padding: 0 12px; flex: 1; overflow-y: auto; }
  .skill-mini {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-size: 12px; color: var(--text2);
    transition: all 0.15s; border: 1px solid transparent;
  }
  .skill-mini:hover { background: rgba(129,140,248,0.06); color: var(--text); }
  .skill-mini.active {
    background: rgba(129,140,248,0.12); color: var(--accent);
    border-color: rgba(129,140,248,0.2); font-weight: 600;
  }
  .skill-mini .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

  .sidebar-footer {
    padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 6px;
  }
  .sidebar-footer button {
    flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer;
    font-size: 11px; transition: all 0.15s; font-family: inherit;
  }
  .sidebar-footer button:hover { color: var(--text); border-color: var(--border); }

  /* ===== MAIN ===== */
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
  }

  /* Chat header */
  .chat-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header .space-title { font-size: 14px; font-weight: 600; }
  .chat-header .space-actions { display: flex; gap: 6px; }
  .chat-header .space-actions button {
    background: none; border: 1px solid var(--border); color: var(--text3);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
    transition: all 0.15s; font-family: inherit;
  }
  .chat-header .space-actions button:hover { color: var(--text); border-color: var(--border); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-group { display: flex; flex-direction: column; gap: 4px; }
  .msg-group-header {
    font-size: 10px; color: var(--text3); text-align: center;
    padding: 12px 0 4px; letter-spacing: 0.5px;
  }
  .msg {
    max-width: 75%; padding: 10px 15px; border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.55; word-break: break-word;
    animation: in 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes in { from { opacity: 0; transform: translateY(6px); } }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4c3f8a 0%, #3d3578 100%);
    border-bottom-right-radius: 3px;
  }
  .msg.ai {
    align-self: flex-start;
    background: var(--surface); border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .msg .skill-tag {
    font-size: 9px; letter-spacing: 0.3px;
    color: var(--accent2); margin-bottom: 3px; font-weight: 600;
  }
  .msg .result {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    margin-top: 4px; overflow: hidden;
  }
  .msg .result .code-actions {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 10px; background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
  }
  .msg .result .code-lang {
    font-size: 10px; color: var(--accent2); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600; margin-right: auto;
  }
  .msg .result .code-actions button {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: 2px 8px; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: all 0.15s; font-family: inherit;
  }
  .msg .result .code-actions button:hover { color: var(--text); border-color: var(--accent); }
  .msg .result pre {
    padding: 10px 12px; margin: 0;
    font-family: 'SF Mono','Fira Code',Consolas,monospace;
    font-size: 11px; white-space: pre-wrap; overflow-x: auto;
    color: #c9d1d9; max-height: 300px; overflow-y: auto;
  }
  .msg .stat-row { display: flex; gap: 12px; margin-top: 4px; font-size: 11px; color: var(--text2); }
  .msg .stat-row .good { color: var(--good); font-weight: 600; }
  .msg .stat-row .bad { color: var(--warn); }
  .msg.ai .msg-actions {
    margin-top: 6px; display: flex; gap: 6px;
  }
  .msg.ai .msg-actions button {
    background: rgba(129,140,248,0.08); border: 1px solid var(--border);
    color: var(--text2); padding: 3px 10px; border-radius: 12px;
    cursor: pointer; font-size: 10px; transition: all 0.15s; font-family: inherit;
  }
  .msg.ai .msg-actions button:hover { background: rgba(129,140,248,0.16); color: var(--accent); border-color: var(--accent); }

  .empty-chat {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--text3); font-size: 14px; line-height: 1.8;
  }

  /* Input */
  .input-area {
    padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 8px));
    border-top: 1px solid var(--border); flex-shrink: 0;
    background: var(--bg2);
  }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .input-row input {
    flex: 1; background: var(--bg); border: 2px solid var(--border);
    color: var(--text); padding: 11px 16px; border-radius: 24px;
    font-size: 13px; outline: none; font-family: inherit;
    transition: all 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(129,140,248,0.1); }
  .input-row input::placeholder { color: var(--text3); }
  .circle-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text2); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .circle-btn:active { transform: scale(0.92); }
  .circle-btn.send { background: var(--gradient); border: none; color: #fff; box-shadow: 0 2px 8px rgba(129,140,248,0.25); }
  .circle-btn.recording { background: var(--bad); border-color: var(--bad); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 12px rgba(248,113,113,0)} }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, rgba(37,39,64,0.98), rgba(33,35,57,0.98));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    color: var(--text); padding: 12px 20px; border-radius: 16px;
    font-size: 13px; z-index: 999; opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(129,140,248,0.1) inset;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .toast-icon { font-size: 16px; flex-shrink: 0; }
  .toast.success { border-color: rgba(52,211,153,0.3); }
  .toast.error { border-color: rgba(248,113,113,0.3); }
  .toast.info { border-color: rgba(129,140,248,0.3); }

  .file-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(129,140,248,0.1); border: 1px solid rgba(129,140,248,0.2);
    border-radius: 12px; padding: 4px 10px; font-size: 11px; color: var(--accent2);
  }
  .file-chip .x { cursor: pointer; color: var(--text3); }
  .file-chip .x:hover { color: var(--bad); }
  input[type="file"] { display: none; }
  #fileArea { padding: 0 20px 4px; display: flex; flex-wrap: wrap; gap: 4px; }

  .inline-code {
    background: var(--bg2); padding: 1px 5px; border-radius: 3px;
    font-size: 12px; border: 1px solid var(--border);
  }

  /* Mobile toggle button */
  .sidebar-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 20;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; cursor: pointer;
    align-items: center; justify-content: center;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 9;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed; left: -260px; top: 0; bottom: 0; z-index: 10;
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
      width: 260px; box-shadow: 4px 0 24px rgba(0,0,0,0.3);
    }
    .sidebar.open { left: 0; }
    .sidebar-toggle { display: flex; }
    .main { width: 100%; }
    .msg { max-width: 92% !important; }
    .chat-header { padding: 12px 16px 12px 56px; }
    .input-area { padding: 8px 12px; }
    .input-row input { font-size: 16px; } /* prevent iOS zoom */
    .skill-grid { grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; max-height: 40%; }
    .skill-card { padding: 12px 10px; }
    .skill-card .card-icon { font-size: 22px; }
    .skill-card .card-name { font-size: 11px; }
    .skill-card .card-desc { font-size: 9px; }
    .circle-btn { width: 38px; height: 38px; }
    .messages { padding: 8px 12px; }
  }

  @media (max-width: 480px) {
    .skill-grid { grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px; }
    .skill-card { padding: 10px 8px; border-radius: 10px; }
    .skill-card .card-icon { font-size: 20px; }
    .skill-card .card-name { font-size: 10px; }
    .skill-card .card-desc { display: none; }
    .chat-header { padding: 10px 12px 10px 48px; }
    .chat-header .space-title { font-size: 13px; }
    .msg { font-size: 12px; padding: 8px 12px; }
    .circle-btn { width: 34px; height: 34px; font-size: 15px; }
    .input-row input { padding: 10px 14px; font-size: 16px; }
  }
</style>
</head>
<body>

<div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">&#x2630;</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Loading Skeleton -->
<div id="appShell" style="display:flex;height:100dvh">
  <div style="width:240px;background:var(--bg2);padding:20px 16px;flex-shrink:0">
    <div style="height:20px;width:100px;background:var(--border);border-radius:4px;margin-bottom:24px;animation:pulse 1.5s infinite"></div>
    <div style="height:12px;width:60px;background:var(--border);border-radius:3px;margin-bottom:8px;animation:pulse 1.5s infinite"></div>
    <div style="height:28px;background:var(--border);border-radius:6px;margin-bottom:6px;animation:pulse 1.5s infinite"></div>
    <div style="height:28px;background:var(--border);border-radius:6px;margin-bottom:6px;animation:pulse 1.5s infinite"></div>
    <div style="height:12px;width:60px;background:var(--border);border-radius:3px;margin:16px 0 8px;animation:pulse 1.5s infinite"></div>
    <div style="height:28px;background:var(--border);border-radius:6px;margin-bottom:6px;animation:pulse 1.5s infinite"></div>
    <div style="height:28px;background:var(--border);border-radius:6px;margin-bottom:6px;animation:pulse 1.5s infinite"></div>
  </div>
  <div style="flex:1;padding:24px;display:flex;flex-direction:column;gap:12px">
    <div style="height:16px;width:120px;background:var(--border);border-radius:4px;animation:pulse 1.5s infinite"></div>
    <div style="flex:1;background:var(--surface);border-radius:16px;animation:pulse 1.5s infinite"></div>
    <div style="height:48px;background:var(--surface);border-radius:24px;animation:pulse 1.5s infinite"></div>
  </div>
</div>
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>

<!-- SIDEBAR -->
<div class="sidebar" style="display:none">
  <div class="sidebar-header">
    <h2>&#x1F916; Skill Copilot</h2>
  </div>

  <div class="spaces-section">
    <div class="section-label">Spaces</div>
    <div id="spaceList"></div>
    <button class="new-thread-btn" onclick="newThread();renderAll();toast('新会话已开始','info')">+ 新建会话</button>
    <button class="new-space-btn" onclick="createSpace()">+ 新建 Space</button>
  </div>

  <div class="skills-section">
    <div class="section-label">Skills</div>
    <div id="skillList"></div>
  </div>

  <div class="skills-section" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px">
    <div class="section-label">&#x1F9E0; Knowledge Base</div>
    <div style="padding:4px 4px 6px">
      <input type="text" id="kbSearch" placeholder="搜索知识库..." oninput="searchKB()"
        style="width:100%;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;outline:none;font-family:inherit">
      <div id="kbResults" style="font-size:10px;max-height:120px;overflow-y:auto;margin-top:4px"></div>
      <button onclick="saveToKB()" style="width:100%;padding:5px;margin-top:4px;background:rgba(129,140,248,0.1);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:10px;font-family:inherit">+ 保存当前会话到知识库</button>
    </div>
  </div>

  <div class="sidebar-footer">
    <button onclick="exportSpace()">&#x1F4E4;</button>
    <button onclick="deleteSpace()">&#x1F5D1;</button>
    <button onclick="changeAPIKey()" title="更换API Key">&#x1F511;</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="chat-header">
    <div class="space-title" id="spaceTitle">默认空间</div>
    <div class="space-actions">
      <button onclick="clearCurrentThread()">清空会话</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-chat">
      <div>
        <div style="font-size:40px;margin-bottom:12px;">&#x1F4AC;</div>
        选择左侧技能 或 直接说出你的需求<br>
        <small style="color:var(--text3)">对话按 Space 自动保存</small>
      </div>
    </div>
  </div>

  <div id="fileArea"></div>

  <div class="input-area">
    <div class="input-row">
      <button class="circle-btn" id="micBtn" onclick="toggleVoice()" title="语音输入">&#x1F3A4;</button>
      <input type="text" id="input" placeholder="输入指令..." onkeydown="if(event.key==='Enter')send()">
      <button class="circle-btn" id="ttsBtn" onclick="toggleTTS()" title="语音播报" style="font-size:14px">&#x1F50A;</button>
      <button class="circle-btn" onclick="document.getElementById('fileInput').click()">&#x1F4CE;</button>
      <button class="circle-btn send" id="sendBtn" onclick="send()">&#x27A4;</button>
    </div>
    <div style="display:flex;gap:12px;padding:6px 4px 0;font-size:10px;color:var(--text3)">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" id="autoSubmit" checked onchange="saveSettings()"> 语音自动发送
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" id="ttsEnabled" onchange="saveSettings()"> 朗读回复
      </label>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" multiple onchange="handleFiles(this)">

<script>
// ============ SKILL REGISTRY ============
const SKILLS = [
  { id:'compress', icon:'&#x1F5DC;', name:'文件压缩', desc:'压缩为 zip/gzip,减小体积', keywords:['压缩','解压','tar','zip','gzip','打包'], handler:'compressFile', type:'local' },
  { id:'code', icon:'&#x1F4BB;', name:'写代码', desc:'生成可运行代码，自动预览，可迭代修改', keywords:['写','生成','代码','脚本','编程','创建','做一个','帮我写','帮我做','改一下','修改','调整','优化代码'], handler:'codeTask', type:'ai',
    prompt:`你是一个资深全栈工程师。生成的代码必须完整、可运行、零依赖(除了CDN)。
规则:
1. 所有Web应用(含UI界面)必须输出完整单文件HTML(内嵌CSS+JS)，可在浏览器直接打开
2. 引用外部库用CDN(如SAP UI5、React、Vue等)，不要用npm
3. 代码带完整的错误处理和友好提示
4. 输出格式: 首先用简短文字说明功能，然后用 \`\`\`html 包裹完整代码
5. 如果用户要的功能太复杂，先做一个功能完整的简化版，标注哪些是简化项
6. 如果是"改/修改/调整"已有代码，只输出改动部分或完整新版本` },
  { id:'debug', icon:'&#x1F50D;', name:'调试修复', desc:'分析报错,找Bug,给方案', keywords:['调试','bug','报错','错误','修复','fix'], handler:'aiTask', type:'ai', prompt:'你是调试专家。分析错误根因，给出修复步骤。' },

const STORAGE_KEY = 'sc_spaces';
let spaces = {};
let currentSpaceId = 'default';
let activeSkill = null;
let pendingFiles = [];
let isListening = false; let recognition = null;
const DEFAULT_API_KEY = ''; // Set your key here to skip prompts: 'sk-xxx'
const apiKey = () => localStorage.getItem('sk_key') || DEFAULT_API_KEY || '';

// ============ SPACES + THREADS ENGINE ============
let currentThreadId = null;

function loadSpaces() {
  try { spaces = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { spaces = {}; }
  if (!spaces['default']) spaces['default'] = { name: '默认空间', threads: {}, threadOrder: [], createdAt: Date.now() };
  if (!spaces[currentSpaceId]) currentSpaceId = 'default';
  // Migrate old format (messages array) -> new format (threads)
  for (const [id, sp] of Object.entries(spaces)) {
    if (!sp.threads && sp.messages) {
      const thId = 'th_' + (sp.createdAt || Date.now());
      sp.threads = { [thId]: { id: thId, title: sp.messages[0]?.text?.slice(0, 40) || '导入的对话', messages: sp.messages, createdAt: sp.createdAt || Date.now() } };
      sp.threadOrder = [thId];
      delete sp.messages;
    }
    if (!sp.threads) { sp.threads = {}; sp.threadOrder = []; }
  }
  const space = spaces[currentSpaceId];
  if (!currentThreadId || !space.threads[currentThreadId]) {
    if (space.threadOrder.length > 0) currentThreadId = space.threadOrder[0];
    else newThread();
  }
  currentThreadId = spaces[currentSpaceId].threadOrder[0] || currentThreadId;
  if (!spaces[currentSpaceId].threads[currentThreadId]) newThread();
}

function saveSpaces() { localStorage.setItem(STORAGE_KEY, JSON.stringify(spaces)); }

function newThread() {
  const space = spaces[currentSpaceId];
  currentThreadId = 'th_' + Date.now();
  space.threads[currentThreadId] = { id: currentThreadId, title: '', messages: [], createdAt: Date.now() };
  space.threadOrder.unshift(currentThreadId);
  saveSpaces();
}

function getCurrentThread() {
  const space = spaces[currentSpaceId];
  if (!space.threads[currentThreadId]) newThread();
  return space.threads[currentThreadId];
}

function getCurrentMessages() { return getCurrentThread().messages; }

function addMessageToSpace(role, text, skill) {
  const thread = getCurrentThread();
  thread.messages.push({ role, text, skill: skill ? { id: skill.id, name: skill.name, icon: skill.icon } : null, time: Date.now() });
  // Auto-title from first user message
  if (!thread.title && role === 'user' && text) {
    thread.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
  }
  saveSpaces();
}

function createSpace() {
  showModal('新建 Space', '输入 Space 名称', false, (name) => {
    if (!name) return;
    const id = 'sp_' + Date.now();
    spaces[id] = { name, threads: {}, threadOrder: [], createdAt: Date.now() };
    currentSpaceId = id;
    currentThreadId = null;
    newThread();
    saveSpaces();
    renderAll();
    toast('已创建: ' + name, 'success');
  });
}

function switchSpace(id) {
  currentSpaceId = id;
  activeSkill = null;
  const space = spaces[currentSpaceId];
  // Pick most recent thread or create new one
  currentThreadId = space.threadOrder.length > 0 ? space.threadOrder[0] : null;
  if (!currentThreadId) newThread();
  renderAll();
}

function switchThread(thId) {
  currentThreadId = thId;
  activeSkill = null;
  renderAll();
}

function deleteSpace() {
  if (currentSpaceId === 'default') { toast('不能删除默认空间', 'error'); return; }
  showConfirm('删除 Space', '确定删除 "' + spaces[currentSpaceId]?.name + '" 及其所有对话？此操作不可恢复。', () => {
    deleteSpaceConfirmed();
  });
}
function deleteSpaceConfirmed() {
  delete spaces[currentSpaceId];
  currentSpaceId = 'default';
  currentThreadId = null;
  newThread();
  saveSpaces();
  renderAll();
  toast('已删除', 'info');
}

function deleteThread(thId) {
  const space = spaces[currentSpaceId];
  if (Object.keys(space.threads).length <= 1) { toast('至少保留一个会话', 'info'); return; }
  delete space.threads[thId];
  space.threadOrder = space.threadOrder.filter(id => id !== thId);
  if (currentThreadId === thId) {
    currentThreadId = space.threadOrder[0];
    if (!currentThreadId) newThread();
  }
  saveSpaces();
  renderAll();
  toast('已删除会话', 'info');
}

function clearCurrentThread() {
  showConfirm('清空会话', '确定清空当前会话的所有消息？此操作不可恢复。', () => {
    clearThreadConfirmed();
  });
}
function clearThreadConfirmed() {
  const thread = getCurrentThread();
  thread.messages = [];
  thread.title = '';
  saveSpaces();
  renderMessages();
}

function exportSpace() {
  const space = spaces[currentSpaceId];
  let text = '# ' + space.name + '\n\n';
  for (const thId of space.threadOrder) {
    const th = space.threads[thId];
    text += `## ${th.title || '未命名会话'} (${new Date(th.createdAt).toLocaleString('zh-CN')})\n\n`;
    th.messages.forEach(m => {
      text += `**${m.role === 'user' ? 'You' : 'AI'}** ${m.skill ? '(' + m.skill.name + ')' : ''}\n${m.text}\n\n---\n\n`;
    });
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/markdown' }));
  a.download = space.name + '.md';
  a.click();
}

function renderSpaceList() {

function matchSkill(text) {
  const l = text.toLowerCase();
  if (activeSkill) return SKILLS.find(s => s.id === activeSkill);
  return SKILLS.find(s => s.keywords.some(k => l.includes(k)));

// ============ RENDER MESSAGES ============
function renderMessages() {
  const container = document.getElementById('messages');
  const msgs = getCurrentMessages();
  if (!msgs.length) {
    container.innerHTML = `<div class="empty-chat"><div><div style="font-size:40px;margin-bottom:12px;">&#x1F4AC;</div>选择左侧技能 或 直接说出你的需求<br><small style="color:var(--text3)">对话按 Space 自动保存</small></div></div>`;
    return;
  }

  // Group by day
  let html = '';
  let lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.time).toLocaleDateString('zh-CN', { month:'short', day:'numeric', weekday:'short' });
    if (d !== lastDate) {
      html += `<div class="msg-group-header">${d}</div>`;
      lastDate = d;
    }
    const cls = m.role === 'user' ? 'user' : 'ai';
    let body = '';
    if (m.skill) body += `<div class="skill-tag">${m.skill.icon} ${m.skill.name}</div>`;
    body += formatMsgText(m.text);
    // Add refine actions for AI messages
    let actions = '';
    if (m.role === 'ai' && m.text) {
      actions = `<div class="msg-actions">
        <button onclick="refineCode('改得更完善一些')">&#x1F504; 完善</button>
        <button onclick="refineCode('简化代码，去掉不必要的部分')">&#x1F4DD; 简化</button>
        <button onclick="refineCode('修复潜在问题，加错误处理')">&#x1F6E0; 加固</button>
      </div>`;
    }
    html += `<div class="msg ${cls}">${body}${actions}</div>`;
  });
  container.innerHTML = html;
  container.scrollTop = 99999;
}

function formatMsgText(text) {
  let idx = 0;
  const blocks = {};
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const id = 'cb' + (idx++);
      const l = (lang || 'text').toLowerCase();
      const isHTML = l === 'html' || code.includes('<!DOCTYPE') || code.includes('<html');
      const isWeb = isHTML || l === 'css' || l === 'javascript' || l === 'js';
      blocks[id] = { code: code.trim(), lang: l, isHTML, isWeb };
      return `<div class="result"><div class="code-actions">
        <span class="code-lang">${l}</span>
        <button onclick="copyCode('${id}')" title="复制">&#x1F4CB;</button>
        <button onclick="downloadCode('${id}')" title="下载">&#x1F4E5;</button>
        ${isHTML ? '<button onclick="runSandbox(\'' + id + '\')" title="运行预览" style="color:var(--good)">&#x25B6;</button>' : ''}
      </div><pre id="${id}">${escHtml(code)}</pre></div>`;
    })
    .replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
}

// ============ COMPRESSION ============
async function compressFile(text, files) {
  if (!files.length) {
    addMessageToSpace('ai', '请先添加文件（点 &#x1F4CE; 或拖放）。支持 .zip (Deflate 最大压缩) 和 .gz (gzip)', null);
    renderMessages(); return;
  }

  if (typeof JSZip === 'undefined') {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
  }
  if (typeof pako === 'undefined') {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
  }

  let totalOriginal = 0;
  const fileData = [];
  for (const f of files) {
    const bytes = f.data || new TextEncoder().encode(f.text || '');
    totalOriginal += bytes.length;
    fileData.push({ name: f.name, bytes });
  }

  let outBlob, outName, compressedSize;
  if (files.length === 1) {
    const compressed = pako.gzip(fileData[0].bytes, { level: 9 });
    compressedSize = compressed.length;
    outBlob = new Blob([compressed], { type: 'application/gzip' });
    outName = fileData[0].name + '.gz';
  } else {
    const zip = new JSZip();
    for (const f of fileData) zip.file(f.name, f.bytes, { compression: 'DEFLATE', compressionOptions: { level: 9 } });
    outBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 9 } });
    compressedSize = outBlob.size;
    outName = 'archive.zip';
  }

  const ratio = ((1 - compressedSize / totalOriginal) * 100).toFixed(1);
  const msg = `压缩完成!\n原始: ${(totalOriginal/1024).toFixed(1)} KB → 压缩后: ${(compressedSize/1024).toFixed(1)} KB (减小 ${ratio}%)\n格式: ${outName.split('.').pop().toUpperCase()}`;

  addMessageToSpace('ai', msg, SKILLS.find(s => s.id === 'compress'));
  renderMessages();

  const a = document.createElement('a');
  a.href = URL.createObjectURL(outBlob);
  a.download = outName;
  a.click();

  if (parseFloat(ratio) < 0) {
    addMessageToSpace('ai', '提示: 文件已高度压缩(如图片/视频)，无法进一步减小。建议转换格式(如 PNG→WebP)。', null);
    renderMessages();
  }
}

// ============ AI TASK ============
async function aiTask(text, skill, files) { await runAI(text, skill, files); }

async function codeTask(text, skill, files) {
  await runAI(text, skill, files);
  // Auto-preview: if the last AI message contains an HTML code block, offer to run it
  const msgs = getCurrentMessages();
  const last = msgs[msgs.length - 1];
  if (last && last.role === 'ai') {
    const codeMatch = last.text.match(/```html\n([\s\S]*?)```/) || last.text.match(/```\n([\s\S]*?<!DOCTYPE[\s\S]*?)```/);
    if (codeMatch) {
      const code = codeMatch[1];
      const sandboxId = 'sandbox_' + Date.now();
      // Store for sandbox
      window._sandboxCode = code;
      // Add inline preview
      last.text += '\n\n<div style="margin-top:8px"><button onclick="openSandboxPreview()" style="padding:8px 16px;background:var(--gradient);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit">&#x25B6; 打开预览</button> <span style="font-size:10px;color:var(--text3);margin-left:6px">点击按钮在新窗口运行</span></div>';
      // Also auto-open
      setTimeout(() => {
        const w = window.open('', '_blank');
        w.document.write(code);
        w.document.close();
      }, 500);
      renderMessages();
    }
  }
}
function openSandboxPreview() {
  if (window._sandboxCode) {
    const w = window.open('', '_blank');
    w.document.write(window._sandboxCode);
    w.document.close();
  }
}

function refineCode(hint) {
  const msgs = getCurrentMessages();
  const codeSkill = SKILLS.find(s => s.id === 'code');
  // Gather the last AI-generated code as context
  let context = hint;
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].role === 'ai' && msgs[i].text) {
      const codeMatch = msgs[i].text.match(/```(?:\w*)\n([\s\S]*?)```/);
      if (codeMatch) {
        context = `以下是之前的代码:\n\`\`\`\n${codeMatch[1]}\n\`\`\`\n用户要求: ${hint}`;
        break;
      }
    }
  }
  document.getElementById('input').value = hint;
  activeSkill = 'code';
  renderSkillList();
  document.getElementById('input').focus();
  toast('输入你的修改需求，然后发送', 'info');
}

async function runAI(text, skill, files) {
  const key = apiKey();
  if (!key) { addMessageToSpace('ai', '请先设置 DeepSeek API Key。刷新页面重新输入。', null); renderMessages(); return; }

  let content = text || '';
  if (files.length) {
    content = '附带了以下文件:\n' + files.map(f =>
      `--- ${f.name} (${(f.size/1024).toFixed(1)}KB) ---\n${(f.text||'[二进制]').slice(0, 4000)}`
    ).join('\n') + '\n\n用户指令: ' + content;
  }

  const messages = [];
  if (skill?.prompt) messages.push({ role: 'system', content: skill.prompt });
  messages.push({ role: 'user', content });

  const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model: 'deepseek-chat', messages, max_tokens: 4096 })
  });
  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content
    || 'API 错误: ' + (data.error?.message || JSON.stringify(data).slice(0, 200));

  addMessageToSpace('ai', reply, skill);
  renderMessages();
}

// ============ FILE HANDLING ============
function handleFiles(input) { for (const f of input.files) readFile(f); input.value = ''; }
function readFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const isText = file.type.startsWith('text') || file.name.match(/\.(js|ts|py|html|css|json|md|txt|xml|yml|yaml|sh|bat|log|sql|csv)$/i);
    const obj = { name: file.name, size: file.size };
    if (isText) obj.text = reader.result;
    else obj.data = new Uint8Array(reader.result);
    pendingFiles.push(obj);
    updateFileChips();
    toast('已添加: ' + file.name + ` (${(file.size/1024).toFixed(1)}KB)`, 'info');
  };
  const isText = file.type.startsWith('text') || file.name.match(/\.(js|ts|py|html|css|json|md|txt|xml|yml|yaml|sh|bat|log|sql|csv)$/i);
  if (isText) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function updateFileChips() {
  const el = document.getElementById('fileArea');
  if (!pendingFiles.length) { el.innerHTML = ''; return; }
  el.innerHTML = pendingFiles.map((f, i) =>
    `<span class="file-chip">&#x1F4C4; ${f.name.slice(0,18)} <span class="x" onclick="removeFile(${i})">&times;</span></span>`
  ).join('');
}
function removeFile(i) { pendingFiles.splice(i, 1); updateFileChips(); }

// ============ VOICE + TTS (Voice Code Windows) ============
function toggleVoice() { isListening ? stopVoice() : startVoice(); }
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('浏览器不支持语音'); return; }
  recognition = new SR(); recognition.continuous = false; recognition.lang = 'zh-CN';
  recognition.onresult = e => {
    document.getElementById('input').value = e.results[0][0].transcript;
    stopVoice();
    if (document.getElementById('autoSubmit')?.checked !== false) send();
  };
  recognition.onerror = e => { stopVoice(); if (e.error !== 'aborted') toast('语音失败: ' + e.error); };
  recognition.onend = () => stopVoice();
  recognition.start(); isListening = true;
  document.getElementById('micBtn').classList.add('recording');
}
function stopVoice() {
  if (recognition) { try { recognition.stop(); } catch(e){}; recognition = null; }
  isListening = false;
  document.getElementById('micBtn').classList.remove('recording');
}

// TTS - reads AI replies aloud (voice-dialog MCP equivalent for Windows/Web)
let ttsSpeaking = false;
function toggleTTS() {
  if (ttsSpeaking) { stopTTS(); return; }
  const msgs = getCurrentMessages();
  const lastAI = [...msgs].reverse().find(m => m.role === 'ai');
  if (!lastAI) { toast('没有可朗读的回复', 'info'); return; }
  if (!('speechSynthesis' in window)) { toast('浏览器不支持 TTS', 'error'); return; }
  speakText(stripHtml(lastAI.text));
}
function speakText(text) {
  stopTTS();
  const u = new SpeechSynthesisUtterance(text.slice(0, 2000));
  u.lang = 'zh-CN'; u.rate = 1.0; u.pitch = 1.0;
  u.onstart = () => { ttsSpeaking = true; updateTTSButton(); };
  u.onend = () => { ttsSpeaking = false; updateTTSButton(); };
  u.onerror = () => { ttsSpeaking = false; updateTTSButton(); };
  speechSynthesis.speak(u);
}
function stopTTS() { speechSynthesis.cancel(); ttsSpeaking = false; updateTTSButton(); }
function updateTTSButton() {
  const btn = document.getElementById('ttsBtn');
  if (!btn) return;
  btn.innerHTML = ttsSpeaking ? '&#x1F507;' : '&#x1F50A;';
  btn.style.color = ttsSpeaking ? 'var(--accent)' : '';
}
function stripHtml(s) { return s.replace(/<[^>]+>/g, '').replace(/&#\d+;/g, '').replace(/&[a-z]+;/g, ''); }
function saveVoiceSettings() {
  localStorage.setItem('sc_autosubmit', document.getElementById('autoSubmit')?.checked);
  localStorage.setItem('sc_tts', document.getElementById('ttsEnabled')?.checked);
}

// Auto-read AI replies when TTS enabled
const _origRenderMsgs = renderMessages;
renderMessages = function() {
  _origRenderMsgs();
  if (document.getElementById('ttsEnabled')?.checked) {
    const msgs = getCurrentMessages();
    const lastAI = [...msgs].reverse().find(m => m.role === 'ai');
    if (lastAI?.text) setTimeout(() => speakText(stripHtml(lastAI.text)), 500);
  }
};

// Load voice settings
setTimeout(() => {
  const auto = localStorage.getItem('sc_autosubmit');
  const tts = localStorage.getItem('sc_tts');
  const autoEl = document.getElementById('autoSubmit');
  const ttsEl = document.getElementById('ttsEnabled');
  if (autoEl) autoEl.checked = auto !== 'false';
  if (ttsEl) ttsEl.checked = tts === 'true';
}, 600);

// ============ KNOWLEDGE BASE ============
let kbTimeout;
function searchKB() {
  clearTimeout(kbTimeout);
  kbTimeout = setTimeout(async () => {
    const q = document.getElementById('kbSearch')?.value?.trim();
    const el = document.getElementById('kbResults');
    if (!q) { el.innerHTML = ''; return; }
    try {
      const res = await fetch('/api/memory/search?q=' + encodeURIComponent(q));
      const items = await res.json();
      el.innerHTML = items.length ? items.map(i =>
        `<div style="padding:4px 6px;cursor:pointer;border-radius:4px;margin:1px 0" onclick="loadKBItem('${i.key}')" title="${i.key}">
          &#x1F4C4; ${i.key.slice(0,25)}<br><span style="color:var(--text3)">${(i.tags||'').slice(0,30)}</span>
        </div>`
      ).join('') : '<div style="color:var(--text3);padding:4px">未找到</div>';
    } catch { el.innerHTML = ''; }
  }, 300);
}

async function loadKBItem(key) {
  try {
    const res = await fetch('/api/kb/' + encodeURIComponent(key));
    const item = await res.json();
    if (item) {
      addMessageToSpace('ai', '知识库: ' + key + '\n\n' + (typeof item.value === 'string' ? item.value : JSON.stringify(item.value, null, 2)), null);
      renderMessages();
      toast('已加载: ' + key, 'info');
    }
  } catch { toast('加载失败', 'error'); }
}

async function saveToKB() {
  const msgs = getCurrentMessages();
  if (!msgs.length) { toast('当前会话没有内容'); return; }
  const key = 'session_' + currentSpaceId + '_' + Date.now();
  const text = msgs.map(m => `[${m.role}] ${stripHtml(m.text || '')}`).join('\n').slice(0, 5000);
  try {
    await fetch('/api/memory/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value: { messages: msgs.length, preview: text.slice(0, 200), full: text }, tags: ['session', (spaces[currentSpaceId]?.name || 'default')] })
    });
    toast('已保存到知识库', 'success');
  } catch { toast('保存失败', 'error'); }
}

// ============ UTILS ============
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); for (const f of e.dataTransfer.files) readFile(f); });

function toast(msg, type) {
  const el = document.getElementById('toast');
  const icon = type === 'success' ? '&#x2705;' : type === 'error' ? '&#x274C;' : type === 'info' ? '&#x2139;' : '&#x1F4AC;';
  el.className = 'toast ' + (type || '');
  el.innerHTML = `<span class="toast-icon">${icon}</span>${msg}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Replace browser prompts with friendly modals
function showModal(title, placeholder, isPassword, callback) {
  const existing = document.querySelector('.custom-modal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'custom-modal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);';
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;width:340px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:14px;animation:modalIn 0.25s cubic-bezier(0.4,0,0.2,1);">
      <style>@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}</style>
      <h3 style="font-size:15px;font-weight:600;margin:0">${title}</h3>
      <input type="${isPassword?'password':'text'}" placeholder="${placeholder}" autofocus
        style="width:100%;padding:12px 15px;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color 0.2s"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="modal-cancel" style="padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit">取消</button>
        <button class="modal-ok" style="padding:8px 18px;border-radius:10px;border:none;background:var(--gradient);color:#fff;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500">确认</button>
      </div>
    </div>`;

  const input = overlay.querySelector('input');
  overlay.querySelector('.modal-ok').onclick = () => {
    const val = input.value.trim();
    overlay.remove();
    if (callback) callback(val);
  };
  overlay.querySelector('.modal-cancel').onclick = () => { overlay.remove(); if (callback) callback(null); };
  overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); if (callback) callback(null); } });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { overlay.querySelector('.modal-ok').click(); }
    if (e.key === 'Escape') { overlay.querySelector('.modal-cancel').click(); }
  });
  document.body.appendChild(overlay);
  setTimeout(() => input.focus(), 100);
}

function showConfirm(title, message, onOk, onCancel) {
  const overlay = document.createElement('div');
  overlay.className = 'custom-modal';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);';
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;width:340px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:16px;animation:modalIn 0.25s cubic-bezier(0.4,0,0.2,1);">
      <h3 style="font-size:15px;font-weight:600;margin:0">${title}</h3>
      <p style="font-size:13px;color:var(--text2);line-height:1.5;margin:0">${message}</p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="modal-cancel" style="padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit">取消</button>
        <button class="modal-ok" style="padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#f87171,#ef4444);color:#fff;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500">确认</button>
      </div>
    </div>`;
  const close = (result) => {
    overlay.remove();
    if (result && onOk) onOk();
    if (!result && onCancel) onCancel();
  };
  overlay.querySelector('.modal-ok').onclick = () => close(true);
  overlay.querySelector('.modal-cancel').onclick = () => close(false);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(false); });
  overlay.addEventListener('keydown', e => {
    if (e.key === 'Escape') close(false);
  });
  document.body.appendChild(overlay);
  overlay.querySelector('.modal-cancel').focus();
}
function changeAPIKey() {
  showModal('更换 API Key', '输入新的 DeepSeek API Key (sk-...)', true, (val) => {
    if (val) { localStorage.setItem('sk_key', val.trim()); toast('Key 已更新', 'success'); }
  });
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
